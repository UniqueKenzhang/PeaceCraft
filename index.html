<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anno Sidebar UI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <aside class="anno-sidebar">
        <!-- Header / City Info -->
        <header class="sidebar-header">
            <div class="city-info">
                <h1 class="city-name">Port Royale</h1>
                <div class="population-count">
                    <span class="icon">👥</span>
                    <span class="value">12,450</span>
                </div>
            </div>
            <div class="global-happiness">
                <div class="happiness-face">😊</div>
            </div>
        </header>

        <!-- Population Tiers -->
        <section class="sidebar-section">
            <h2 class="section-title">Population Tiers</h2>
            <div class="tier-card">
                <div class="tier-header">
                    <span class="tier-icon">👨‍🌾</span>
                    <span class="tier-name">Farmers</span>
                    <span class="tier-value">4,200</span>
                </div>
                <div class="happiness-meter">
                    <div class="meter-bar" style="width: 85%;"></div>
                </div>
            </div>
            <div class="tier-card">
                <div class="tier-header">
                    <span class="tier-icon">🛠️</span>
                    <span class="tier-name">Workers</span>
                    <span class="tier-value">5,800</span>
                </div>
                <div class="happiness-meter">
                    <div class="meter-bar" style="width: 65%;"></div>
                </div>
            </div>
            <div class="tier-card">
                <div class="tier-header">
                    <span class="tier-icon">🎩</span>
                    <span class="tier-name">Artisans</span>
                    <span class="tier-value">2,450</span>
                </div>
                <div class="happiness-meter">
                    <div class="meter-bar" style="width: 40%;"></div>
                </div>
            </div>
        </section>

        <!-- Industrial Output -->
        <section class="sidebar-section">
            <h2 class="section-title">Industrial Output</h2>
            <div class="resource-grid">
                <div class="resource-item">
                    <div class="resource-icon">🍞</div>
                    <div class="resource-info">
                        <span class="resource-name">Bread</span>
                        <div class="output-indicator positive">+4.2</div>
                    </div>
                </div>
                <div class="resource-item">
                    <div class="resource-icon">🍺</div>
                    <div class="resource-info">
                        <span class="resource-name">Beer</span>
                        <div class="output-indicator neutral">0.0</div>
                    </div>
                </div>
                <div class="resource-item">
                    <div class="resource-icon">👕</div>
                    <div class="resource-info">
                        <span class="resource-name">Clothes</span>
                        <div class="output-indicator negative">-1.5</div>
                    </div>
                </div>
                <div class="resource-item">
                    <div class="resource-icon">🧱</div>
                    <div class="resource-info">
                        <span class="resource-name">Bricks</span>
                        <div class="output-indicator positive">+12.0</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Maintenance / Finances -->
        <footer class="sidebar-footer">
            <div class="finance-item">
                <span class="label">Balance:</span>
                <span class="value money">+£1,240</span>
            </div>
            <div class="finance-item">
                <span class="label">Influence:</span>
                <span class="value influence">145</span>
            </div>
        </footer>
    </aside>

</body>
</html>
