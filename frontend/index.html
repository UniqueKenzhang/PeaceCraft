<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeaceCraft - Anno Elite Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0806; --bg-panel: #1c1814; --bg-card: #2a241e;
            --gold: #c9a84c; --gold-bright: #e8c84a; --border: #3d3529;
            --alliance: #2a4e6e; --legion: #521e1e;
        }
        body { font-family: 'Crimson Pro', serif; background-color: var(--bg-dark); color: #d4c5a9; overflow: hidden; margin: 0; user-select: none; }
        .stat-font { font-family: 'Cinzel', serif; }
        
        #game-container { display: flex; width: 100vw; height: 100vh; }
        
        /* Sidebar: Classic Anno Style */
        #sidebar { width: 320px; background: var(--bg-panel); border-right: 2px solid var(--border); display: flex; flex-direction: column; z-index: 50; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        
        /* Top Navigation: Anno Influence Bar */
        #top-bar { height: 60px; background: linear-gradient(to bottom, #231f1a, #1a1612); border-bottom: 1px solid var(--border); display: flex; align-items: center; px: 20px; z-index: 40; }

        /* Anno Circular Construction Menu style */
        .bld-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .bld-item { 
            aspect-ratio: 1; background: var(--bg-card); border: 1px solid var(--border); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: all 0.2s; cursor: pointer; border-radius: 8px;
        }
        .bld-item:hover { background: #3d3529; border-color: var(--gold); transform: translateY(-2px); }
        .bld-item.selected { border-color: var(--gold-bright); box-shadow: 0 0 15px rgba(201,168,76,0.3); background: #3d3529; }
        
        canvas { display: block; background: #000; cursor: crosshair; }

        /* Anno Notification Toasts */
        .anno-toast {
            position: absolute; bottom: 100px; right: 20px; background: rgba(28, 24, 20, 0.9);
            border-left: 4px solid var(--gold); padding: 12px 20px; border-radius: 4px;
            font-size: 13px; transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .anno-toast.show { transform: translateX(0); }

        .progress-track { height: 4px; background: #000; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--gold); transition: width 0.3s; }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- ANNO SIDEBAR -->
        <div id="sidebar">
            <div class="p-8 border-b border-white/5 text-center">
                <h1 class="stat-font text-gold text-2xl tracking-[6px] font-black italic">ANNO</h1>
                <p class="text-[9px] text-slate-500 uppercase tracking-[3px] mt-1">PeaceCraft Chronicles</p>
            </div>

            <!-- Population & Needs -->
            <div class="p-6 space-y-6">
                <div id="pop-section">
                    <div class="flex justify-between items-end mb-2">
                        <span class="stat-font text-[11px] text-slate-400 uppercase">Population Level</span>
                        <span id="ui-pop-count" class="mono text-gold text-sm font-bold">0</span>
                    </div>
                    <div class="progress-track"><div id="ui-pop-bar" class="progress-fill" style="width: 0%"></div></div>
                    <div id="ui-pop-tiers" class="mt-4 grid grid-cols-2 gap-2"></div>
                </div>

                <div class="border-t border-white/5 pt-6">
                    <span class="stat-font text-[11px] text-slate-400 uppercase block mb-4">Construction Bureau</span>
                    <div class="flex gap-2 mb-4 bg-black/20 p-1 rounded-lg">
                        <button onclick="Game.switchTab('raw')" id="tab-raw" class="flex-1 py-2 text-[9px] font-bold uppercase tab-btn active">Production</button>
                        <button onclick="Game.switchTab('civil')" id="tab-civil" class="flex-1 py-2 text-[9px] font-bold uppercase tab-btn">Institutions</button>
                    </div>
                    <div id="bld-grid" class="grid grid-cols-3 gap-2"></div>
                </div>
            </div>

            <div class="mt-auto p-6 bg-black/20 border-t border-white/5">
                <div class="flex justify-between text-[10px] text-slate-500 mono mb-4">
                    <span>STATUS</span>
                    <span id="ui-server-status" class="text-green-500">OPTIMAL</span>
                </div>
                <button onclick="Game.switchScene('battle')" class="w-full py-3 bg-slate-800 border border-white/10 text-white stat-font text-[10px] tracking-widest hover:bg-slate-700 transition-all">VIEW WAR THEATER</button>
            </div>
        </div>

        <div id="main-area">
            <!-- ANNO INFO BAR -->
            <div id="top-bar" class="px-8 flex items-center justify-between">
                <div class="flex gap-10">
                    <button onclick="Game.switchScene('human')" id="scene-human" class="stat-font text-xs tracking-widest hover:text-gold transition-all active">OLD WORLD (ALLIANCE)</button>
                    <button onclick="Game.switchScene('demon')" id="scene-demon" class="stat-font text-xs tracking-widest hover:text-gold transition-all">NEW WORLD (LEGION)</button>
                </div>

                <div id="res-bar" class="flex gap-6 items-center">
                    <!-- Res Injected -->
                </div>

                <div class="flex items-center gap-8">
                    <div class="text-right">
                        <div class="text-[9px] text-slate-500 uppercase font-bold mono">Empire Balance</div>
                        <div id="ui-peace" class="text-gold font-bold stat-font text-xl">0</div>
                    </div>
                </div>
            </div>

            <!-- CANVAS -->
            <div id="viewport" class="flex-1 relative overflow-hidden bg-black">
                <canvas id="gameCanvas"></canvas>
                
                <!-- Supply Tooltip (Floating) -->
                <div id="supply-ui" class="absolute bottom-10 left-1/2 -translate-x-1/2 bg-[#1c1814]/95 border-2 border-[#3d3529] p-8 rounded-sm shadow-2xl w-[600px] backdrop-blur-md">
                    <div class="flex justify-between mb-6 items-center border-b border-white/5 pb-4">
                        <span id="ui-force-side" class="stat-font text-sm uppercase text-gold tracking-widest">Supply Logistics</span>
                        <div class="flex items-center gap-4">
                            <span class="text-[10px] text-slate-500 mono">STRATEGIC FORCE</span>
                            <span id="ui-force-val" class="mono text-white text-2xl font-black">500</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-12">
                        <div class="space-y-4">
                            <div class="flex justify-between text-[10px] uppercase tracking-tighter"><span>Industrial Munitions</span><span id="v-true" class="text-gold">50%</span></div>
                            <input type="range" id="in-true" oninput="Game.upSlid()" class="w-full accent-gold h-1 bg-black rounded-none appearance-none cursor-pointer">
                        </div>
                        <div class="space-y-4">
                            <div class="flex justify-between text-[10px] uppercase tracking-tighter"><span>Experimental Gags</span><span id="v-funny" class="text-gold">50%</span></div>
                            <input type="range" id="in-funny" oninput="Game.upSlid()" class="w-full accent-gold h-1 bg-black rounded-none appearance-none cursor-pointer">
                        </div>
                    </div>
                    <button onclick="Game.dispatch()" class="w-full mt-8 py-4 bg-gold hover:bg-gold-bright text-black font-black uppercase text-[11px] tracking-[4px] transition-all">Execute Transfer</button>
                </div>

                <!-- BATTLE OVERLAY -->
                <div id="battle-view" class="hidden absolute inset-0 bg-[#0a0806]/90 flex flex-col items-center justify-center p-12 space-y-16">
                    <div class="w-full max-w-3xl text-center space-y-6">
                        <div class="stat-font text-sm tracking-[0.8em] text-slate-500 uppercase">Universal Equilibrium</div>
                        <div class="relative h-2 bg-white/5 rounded-full overflow-hidden">
                            <div id="ui-balance" class="h-full bg-gold shadow-[0_0_20px_#c9a84c] transition-all duration-1000" style="width: 50%"></div>
                        </div>
                    </div>
                    <div class="relative w-full flex items-center justify-between px-40">
                        <div id="unit-h" class="w-32 h-32 border-2 border-blue-500/30 flex flex-col items-center justify-center bg-blue-500/5 rounded-full transition-all duration-1000">
                            <span class="text-5xl">🛡️</span>
                            <span class="text-[10px] mt-4 stat-font tracking-widest text-blue-400">ALLIANCE</span>
                        </div>
                        <div class="stat-font text-white/5 text-9xl font-black italic">VERSUS</div>
                        <div id="unit-d" class="w-32 h-32 border-2 border-red-500/30 flex flex-col items-center justify-center bg-red-500/5 rounded-full transition-all duration-1000">
                            <span class="text-5xl">🔥</span>
                            <span class="text-[10px] mt-4 stat-font tracking-widest text-red-400">LEGION</span>
                        </div>
                    </div>
                    <div id="ui-log" class="w-full max-w-2xl h-40 border border-white/5 bg-black/40 p-6 overflow-y-auto mono text-[10px] text-slate-600 scroll-smooth leading-loose"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="anno-toast" class="anno-toast stat-font uppercase tracking-widest">Message received.</div>

    <script>
        const TILE = 48; const MAP_SZ = 40;
        const Game = {
            state: {
                human: { pop: 100, tiers: { peasant: 100, citizen: 0 }, food: 500, wood: 200, stone: 100, placed: [], camera: { x: 800, y: 800 }, selected: null },
                demon: { pop: 100, tiers: { slave: 100, lord: 0 }, meat: 500, bone: 200, mana: 100, placed: [], camera: { x: 800, y: 800 }, selected: null },
                battle: { hForce: 500, dForce: 500, peace: 0 },
                scene: 'human', tab: 'raw', mouse: { x: 0, y: 0, gx: 0, gy: 0 }, drag: null
            },

            config: {
                human: {
                    farm: { name: 'FARM', icon: '🌾', size: [2,2], cat: 'raw', cost: { wood: 50 }, prod: { out: 'food', val: 5 } },
                    sawmill: { name: 'SAWMILL', icon: '🪚', size: [1,1], cat: 'raw', cost: { stone: 80 }, prod: { out: 'wood', val: 3 } },
                    quarry: { name: 'QUARRY', icon: '⛏️', size: [2,1], cat: 'raw', cost: { wood: 120 }, prod: { out: 'stone', val: 2 } }
                },
                demon: {
                    pit: { name: 'PIT', icon: '🥩', size: [2,2], cat: 'raw', cost: { bone: 50 }, prod: { out: 'meat', val: 5 } },
                    altar: { name: 'ALTAR', icon: '💀', size: [1,1], cat: 'raw', cost: { mana: 80 }, prod: { out: 'bone', val: 3 } },
                    rift: { name: 'RIFT', icon: '🌀', size: [2,1], cat: 'raw', cost: { bone: 120 }, prod: { out: 'mana', val: 2 } }
                }
            },

            init() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                window.addEventListener('resize', () => this.resize());
                this.resize();
                
                this.canvas.addEventListener('mousedown', e => this.onDown(e));
                window.addEventListener('mousemove', e => this.onMove(e));
                window.addEventListener('mouseup', e => this.onUp(e));
                this.canvas.addEventListener('contextmenu', e => { e.preventDefault(); this.demolish(); });

                this.renderBldGrid();
                this.loop();
                requestAnimationFrame(t => this.draw(t));
                this.toast("ANNO INTERFACE OPERATIONAL");
            },

            resize() {
                const rect = this.canvas.parentElement.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
            },

            toast(msg) {
                const t = document.getElementById('anno-toast');
                t.innerText = msg; t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 3000);
            },

            switchScene(s) {
                this.state.scene = s;
                document.querySelectorAll('#top-bar .stat-font').forEach(b => b.classList.remove('text-gold'));
                if (s !== 'battle') document.getElementById(`scene-${s}`).classList.add('text-gold');
                
                document.getElementById('battle-view').classList.toggle('hidden', s !== 'battle');
                document.getElementById('supply-ui').classList.toggle('hidden', s === 'battle');
                this.renderBldGrid();
                this.updateUI();
            },

            switchTab(t) {
                this.state.tab = t;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`tab-${t}`).classList.add('active');
                this.renderBldGrid();
            },

            renderBldGrid() {
                const s = this.state.scene; if (s === 'battle') return;
                const el = document.getElementById('bld-grid'); el.innerHTML = '';
                Object.entries(this.config[s]).forEach(([k, b]) => {
                    if (b.cat !== this.state.tab) return;
                    const item = document.createElement('div');
                    item.className = `bld-item ${this.state[s].selected === k ? 'selected' : ''}`;
                    item.innerHTML = `<span class="text-xl">${b.icon}</span><span class="text-[8px] mt-2 font-bold">${b.name}</span>`;
                    item.onclick = () => { this.state[s].selected = (this.state[s].selected === k) ? null : k; this.renderBldGrid(); };
                    el.appendChild(item);
                });
            },

            onDown(e) {
                if (e.button === 0) {
                    if (this.state[this.state.scene]?.selected) this.place();
                    else this.state.drag = { x: e.clientX, y: e.clientY, camX: this.state[this.state.scene].camera.x, camY: this.state[this.state.scene].camera.y };
                }
            },

            onMove(e) {
                const rect = this.canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left, my = e.clientY - rect.top;
                this.state.mouse.x = mx; this.state.mouse.y = my;
                const cur = this.state[this.state.scene];
                if (this.state.drag && cur) {
                    cur.camera.x = this.state.drag.camX - (e.clientX - this.state.drag.x);
                    cur.camera.y = this.state.drag.camY - (e.clientY - this.state.drag.y);
                    const max = MAP_SZ * TILE;
                    cur.camera.x = Math.max(0, Math.min(max - this.canvas.width, cur.camera.x));
                    cur.camera.y = Math.max(0, Math.min(max - this.canvas.height, cur.camera.y));
                }
                if (cur) {
                    this.state.mouse.gx = Math.floor((mx + cur.camera.x) / TILE);
                    this.state.mouse.gy = Math.floor((my + cur.camera.y) / TILE);
                }
            },

            onUp() { this.state.drag = null; },

            place() {
                const s = this.state.scene; const cur = this.state[s];
                const type = cur.selected; const b = this.config[s][type];
                const gx = this.state.mouse.gx, gy = this.state.mouse.gy;
                if (gx < 2 || gy < 2 || gx + b.size[0] > MAP_SZ - 2 || gy + b.size[1] > MAP_SZ - 2) return;
                for(let p of cur.placed) {
                    const pb = this.config[s][p.type];
                    if (!(gx + b.size[0] <= p.gx || gx >= p.gx + pb.size[0] || gy + b.size[1] <= p.gy || gy >= p.gy + pb.size[1])) {
                        this.toast("SITE OCCUPIED"); return;
                    }
                }
                for(let r in b.cost) if (cur[r] < b.cost[r]) { this.toast("LACK OF RESOURCES"); return; }
                for(let r in b.cost) cur[r] -= b.cost[r];
                cur.placed.push({ type, gx, gy });
                this.toast(`${b.name} ESTABLISHED`);
                this.updateUI();
            },

            demolish() {
                const s = this.state.scene; const cur = this.state[s];
                const gx = this.state.mouse.gx, gy = this.state.mouse.gy;
                const idx = cur.placed.findIndex(p => {
                    const pb = this.config[s][p.type];
                    return gx >= p.gx && gx < p.gx + pb.size[0] && gy >= p.gy && gy < p.gy + pb.size[1];
                });
                if (idx !== -1) { 
                    const p = cur.placed[idx]; for(let r in this.config[s][p.type].cost) cur[r] += Math.floor(this.config[s][p.type].cost[r] * 0.5);
                    cur.placed.splice(idx, 1); this.toast("DECONSTRUCTION COMPLETE"); this.updateUI(); 
                }
            },

            upSlid() {
                document.getElementById('v-true').innerText = document.getElementById('in-true').value + '%';
                document.getElementById('v-funny').innerText = document.getElementById('in-funny').value + '%';
            },

            dispatch() {
                const s = this.state.scene;
                this.log(`Convoy outbound to ${s} sector.`);
                setTimeout(() => {
                    const key = s === 'human' ? 'hForce' : 'dForce';
                    this.state.battle[key] += 150;
                    this.toast("SUPPLY ARRIVED");
                    this.updateUI();
                }, 2000);
            },

            draw() {
                const s = this.state.scene; if (s === 'battle') { requestAnimationFrame(t => this.draw(t)); return; }
                const ctx = this.ctx; const cur = this.state[s]; const cam = cur.camera;
                ctx.clearRect(0,0,this.canvas.width, this.canvas.height);
                
                // Terrain
                for(let y=0; y<MAP_SZ; y++) {
                    for(let x=0; x<MAP_SZ; x++) {
                        const sx = x*TILE - cam.x, sy = y*TILE - cam.y;
                        if (sx < -TILE || sy < -TILE || sx > this.canvas.width || sy > this.canvas.height) continue;
                        const water = x < 2 || y < 2 || x > MAP_SZ-3 || y > MAP_SZ-3;
                        ctx.fillStyle = water ? '#1e3a52' : ((x+y)%2 ? '#2a361e' : '#222b18');
                        ctx.fillRect(sx, sy, TILE, TILE);
                        ctx.strokeStyle = 'rgba(255,255,255,0.02)'; ctx.strokeRect(sx, sy, TILE, TILE);
                    }
                }

                // Buildings
                cur.placed.forEach(p => {
                    const b = this.config[s][p.type];
                    const sx = p.gx*TILE - cam.x, sy = p.gy*TILE - cam.y;
                    ctx.fillStyle = '#2a241e'; ctx.shadowBlur = 10; ctx.shadowColor = 'black';
                    ctx.fillRect(sx+4, sy+4, b.size[0]*TILE-8, b.size[1]*TILE-8);
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#c9a84c44'; ctx.lineWidth = 1; ctx.strokeRect(sx+4, sy+4, b.size[0]*TILE-8, b.size[1]*TILE-8);
                    ctx.fillStyle = 'white'; ctx.font = '24px serif'; ctx.textAlign = 'center';
                    ctx.fillText(b.icon, sx + (b.size[0]*TILE)/2, sy + (b.size[1]*TILE)/2 + 8);
                });

                // Anno Ghost Preview
                if (cur.selected) {
                    const b = this.config[s][cur.selected];
                    const gx = this.state.mouse.gx, gy = this.state.mouse.gy;
                    ctx.globalAlpha = 0.3; ctx.fillStyle = '#c9a84c';
                    ctx.fillRect(gx*TILE - cam.x, gy*TILE - cam.y, b.size[0]*TILE, b.size[1]*TILE);
                    ctx.globalAlpha = 1;
                }
                requestAnimationFrame(t => this.draw(t));
            },

            log(m) {
                const l = document.getElementById('ui-log');
                const p = document.createElement('p'); p.innerHTML = `<span class="text-white/10">[CHRONICLE]</span> ${m}`;
                l.prepend(p);
            },

            updateUI() {
                const s = this.state.scene; const cur = this.state[s];
                const h = this.state.human, d = this.state.demon, b = this.state.battle;
                
                document.getElementById('res-bar').innerHTML = s === 'human' ? `
                    <div class="flex items-center gap-2">🌾 <span class="text-white">${Math.floor(h.food)}</span></div>
                    <div class="flex items-center gap-2">🪵 <span class="text-white">${Math.floor(h.wood)}</span></div>
                    <div class="flex items-center gap-2">🪨 <span class="text-white">${Math.floor(h.stone)}</span></div>
                ` : `
                    <div class="flex items-center gap-2">🥩 <span class="text-white">${Math.floor(d.meat)}</span></div>
                    <div class="flex items-center gap-2">💀 <span class="text-white">${Math.floor(d.bone)}</span></div>
                    <div class="flex items-center gap-2">🌀 <span class="text-white">${Math.floor(d.mana)}</span></div>
                `;

                const totalPop = h.pop + d.pop;
                document.getElementById('ui-pop-count').innerText = totalPop;
                document.getElementById('ui-pop-bar').style.width = (totalPop / 20) + '%';
                document.getElementById('ui-pop-tiers').innerHTML = s === 'human' ? 
                    `<div class="flex justify-between"><span>Peasants</span><span>${h.tiers.peasant}</span></div><div class="flex justify-between"><span>Citizens</span><span>${h.tiers.citizen}</span></div>` :
                    `<div class="flex justify-between"><span>Slaves</span><span>${d.tiers.slave}</span></div><div class="flex justify-between"><span>Lords</span><span>${d.tiers.lord}</span></div>`;
                
                document.getElementById('ui-peace').innerText = b.peace;
                const balance = (b.hForce / (b.hForce + b.dForce)) * 100;
                document.getElementById('ui-balance').style.width = `${balance}%`;
                document.getElementById('ui-force-val').innerText = Math.floor(b[s === 'human' ? 'hForce' : 'dForce']);
            },

            loop() {
                setInterval(() => {
                    const h = this.state.human, d = this.state.demon, b = this.state.battle;
                    h.food -= h.pop * 0.05; d.meat -= d.pop * 0.05;
                    h.placed.forEach(p => h[this.config.human[p.type].prod.out] += this.config.human[p.type].prod.val);
                    d.placed.forEach(p => d[this.config.demon[p.type].prod.out] += this.config.demon[p.type].prod.val);
                    b.hForce += (Math.random()*4 - 2); b.dForce += (Math.random()*4 - 2);
                    this.updateUI();
                }, 1000);
            }
        };
        Game.init();
    </script>
</body>
</html>
