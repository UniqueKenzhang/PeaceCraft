<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeaceCraft - 天平之祭 (Anno Builder Edition)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --gold: #c9a84c;
            --gold-bright: #e8c84a;
            --alliance: #2563eb;
            --legion: #dc2626;
        }
        body { 
            font-family: 'Crimson Pro', serif; 
            background-color: var(--bg-dark); 
            color: #d4c5a9; 
            overflow: hidden; 
        }
        .stat-font { font-family: 'Cinzel', serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Anno-style Grid */
        .anno-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 16px;
            border: 1px solid rgba(201,168,76,0.2);
        }
        .anno-cell {
            aspect-ratio: 1;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .anno-cell:hover {
            border-color: var(--gold);
            background: rgba(201,168,76,0.1);
        }
        .anno-cell.fertile {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
        }
        .anno-cell.fertile::before {
            content: '🌱';
            position: absolute;
            top: 2px;
            right: 2px;
            font-size: 0.6rem;
            opacity: 0.5;
        }

        /* Preview Ghost */
        .anno-cell.preview::after {
            content: attr(data-icon);
            opacity: 0.3;
            filter: grayscale(1);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(0.9); opacity: 0.2; } 50% { transform: scale(1.1); opacity: 0.5; } }

        /* Tabs */
        .tab-btn {
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .tab-btn.active {
            color: var(--gold);
            border-bottom: 2px solid var(--gold);
        }

        /* Building Card */
        .bld-card {
            background: var(--bg-panel);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }
        .bld-card.selected {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(201,168,76,0.2);
            background: rgba(201,168,76,0.05);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div id="game-app" class="max-w-5xl mx-auto h-screen flex flex-col p-4">
        
        <!-- Top Resource Bar (Anno Style) -->
        <div class="flex items-center gap-4 bg-slate-900/80 p-3 rounded-2xl border border-slate-800 mb-4 overflow-x-auto mono text-xs">
            <div class="flex items-center gap-2 bg-black/20 px-3 py-1 rounded-md border border-white/5">
                <span id="ui-weather-icon">☀️</span>
                <span id="ui-weather-text" class="text-amber-500">Normal</span>
            </div>
            <div class="h-4 w-px bg-slate-700"></div>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-1"><span>🌾</span><span id="ui-res-food">0</span></div>
                <div class="flex items-center gap-1"><span>🪵</span><span id="ui-res-wood">0</span></div>
                <div class="flex items-center gap-1"><span>🪨</span><span id="ui-res-stone">0</span></div>
            </div>
            <div class="h-4 w-px bg-slate-700"></div>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-1"><span>🥩</span><span id="ui-res-meat">0</span></div>
                <div class="flex items-center gap-1"><span>💀</span><span id="ui-res-bone">0</span></div>
                <div class="flex items-center gap-1"><span>🌀</span><span id="ui-res-mana">0</span></div>
            </div>
            <div class="flex-1"></div>
            <div class="flex items-center gap-2 font-bold">
                <span class="text-slate-500">PEACE:</span>
                <span id="ui-peace-score" class="text-gold text-lg">0</span>
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="flex-1 flex gap-6 min-h-0">
            
            <!-- Left: Sidebar (Buildings & Stats) -->
            <div class="w-72 flex flex-col bg-slate-900/50 rounded-3xl border border-slate-800 p-6">
                <div class="mb-6">
                    <h1 class="stat-font text-gold text-xl tracking-widest border-b border-gold/20 pb-2 mb-4">COLONY</h1>
                    <div class="flex justify-between items-end mb-1">
                        <span class="text-[10px] text-slate-500 font-bold uppercase">Population</span>
                        <span id="ui-pop-count" class="mono text-gold text-sm">0 / 0</span>
                    </div>
                    <div class="h-1 bg-black/40 rounded-full overflow-hidden">
                        <div id="ui-pop-fill" class="h-full bg-gold transition-all" style="width: 20%"></div>
                    </div>
                    <div id="ui-pop-tiers" class="mt-3 space-y-1 text-[10px] mono text-slate-400">
                        <!-- Tiers injected here -->
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto pr-2 space-y-3" id="ui-building-list">
                    <!-- Buildings injected here -->
                </div>
            </div>

            <!-- Right: Map & Battle -->
            <div class="flex-1 flex flex-col gap-6">
                <!-- Tabs -->
                <div class="flex gap-8 border-b border-slate-800">
                    <button onclick="Game.switchScene('human')" id="tab-human" class="tab-btn px-4 py-2 text-sm font-bold active">🏰 Human Alliance</button>
                    <button onclick="Game.switchScene('demon')" id="tab-demon" class="tab-btn px-4 py-2 text-sm font-bold">🔥 Demon Legion</button>
                    <button onclick="Game.switchScene('battle')" id="tab-battle" class="tab-btn px-4 py-2 text-sm font-bold">⚖️ Battlefield</button>
                </div>

                <div id="scene-viewport" class="flex-1 relative">
                    <!-- Map View (Human/Demon) -->
                    <div id="view-map" class="h-full flex flex-col gap-6">
                        <div class="flex-1 flex items-center justify-center">
                            <div class="anno-grid w-96 h-96" id="ui-map-grid">
                                <!-- 16 Cells -->
                            </div>
                        </div>
                        
                        <!-- Supply Controls -->
                        <div class="bg-slate-900/80 p-6 rounded-3xl border border-slate-800">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="stat-font text-sm uppercase tracking-widest text-slate-400">Frontline Supply</h3>
                                <div id="ui-force-display" class="mono text-lg text-white">FORCE: 500</div>
                            </div>
                            <div class="grid grid-cols-2 gap-8">
                                <div class="space-y-4">
                                    <div class="flex justify-between text-[10px] mono"><span>Steel Weapons</span><span id="ui-val-true">50%</span></div>
                                    <input type="range" id="input-true" oninput="Game.updateSliders()" class="w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-gold">
                                </div>
                                <div class="space-y-4">
                                    <div class="flex justify-between text-[10px] mono"><span>Funny Gags</span><span id="ui-val-funny">50%</span></div>
                                    <input type="range" id="input-funny" oninput="Game.updateSliders()" class="w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-gold">
                                </div>
                            </div>
                            <button onclick="Game.executeSupply()" class="w-full mt-6 py-4 bg-gold hover:bg-gold-bright text-slate-900 font-black rounded-xl transition-all uppercase tracking-tighter">Dispatch Convoy</button>
                        </div>
                    </div>

                    <!-- Battle View (Hidden by default) -->
                    <div id="view-battle" class="hidden h-full flex flex-col items-center justify-center space-y-12">
                        <div class="w-full max-w-2xl text-center space-y-4">
                            <div class="stat-font text-xs tracking-widest text-slate-500 uppercase">Universal Balance</div>
                            <div class="relative h-12 bg-black/40 rounded-xl border-2 border-slate-800 overflow-hidden">
                                <div id="ui-balance-bar" class="h-full bg-gradient-to-r from-blue-600 via-gold to-red-600 transition-all duration-700" style="width: 50%"></div>
                            </div>
                            <div id="ui-warning" class="text-[10px] font-bold text-amber-600 animate-pulse uppercase tracking-widest">! Equilibrium Stable !</div>
                        </div>

                        <div class="relative w-full h-48 flex items-center justify-center bg-slate-900/20 rounded-[3rem] border border-white/5">
                            <div id="unit-human" class="absolute w-20 h-20 bg-blue-600/20 border-2 border-blue-500 rounded-2xl flex items-center justify-center text-3xl transition-all duration-1000 shadow-[0_0_30px_rgba(37,99,235,0.2)]" style="left: 20%">🛡️</div>
                            <div class="text-slate-800 font-black text-6xl opacity-10 select-none italic">VS</div>
                            <div id="unit-demon" class="absolute w-20 h-20 bg-red-600/20 border-2 border-red-500 rounded-2xl flex items-center justify-center text-3xl transition-all duration-1000 shadow-[0_0_30px_rgba(220,38,38,0.2)]" style="right: 20%">🔥</div>
                        </div>

                        <div id="ui-log" class="w-full max-w-2xl h-48 bg-black/40 rounded-2xl p-4 overflow-y-auto mono text-[10px] text-slate-500 border border-white/5 leading-relaxed">
                            <p class="text-gold/60">> Chronicle initialized. Awaiting Dragon King's command...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const Game = {
            state: {
                human: { 
                    pop: 100, tiers: { peasant: 100, citizen: 0 }, 
                    food: 500, wood: 200, stone: 100, 
                    grid: Array(16).fill(null), fertility: [2, 5, 11],
                    buildings: { farm: 0, sawmill: 0, quarry: 0 }, selected: null 
                },
                demon: { 
                    pop: 100, tiers: { slave: 100, lord: 0 }, 
                    meat: 500, bone: 200, mana: 100, 
                    grid: Array(16).fill(null), fertility: [3, 8, 14],
                    buildings: { pit: 0, altar: 0, rift: 0 }, selected: null 
                },
                battle: { hForce: 500, dForce: 500, peaceScore: 0, isGameOver: false },
                activeScene: 'human', weather: '☀️ Clear', weatherBoost: 1.0
            },

            config: {
                human: {
                    farm: { name: 'Wheat Farm', icon: '🌾', cost: { wood: 50 }, prod: { out: 'food', val: 5 } },
                    sawmill: { name: 'Sawmill', icon: '🪚', cost: { stone: 100 }, prod: { out: 'wood', val: 3 } },
                    quarry: { name: 'Quarry', icon: '⛏️', cost: { wood: 150 }, prod: { out: 'stone', val: 2 } }
                },
                demon: {
                    pit: { name: 'Flesh Pit', icon: '🥩', cost: { bone: 50 }, prod: { out: 'meat', val: 5 } },
                    altar: { name: 'Soul Altar', icon: '💀', cost: { mana: 100 }, prod: { out: 'bone', val: 3 } },
                    rift: { name: 'Void Rift', icon: '🌀', cost: { bone: 150 }, prod: { out: 'mana', val: 2 } }
                }
            },

            init() {
                window.Game = this;
                this.renderBuildingList();
                this.renderGrid();
                this.loop();
                this.log("Colony management systems operational.");
            },

            switchScene(scene) {
                this.state.activeScene = scene;
                const map = document.getElementById('view-map');
                const battle = document.getElementById('view-battle');
                
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`tab-${scene}`).classList.add('active');

                if (scene === 'battle') {
                    map.classList.add('hidden');
                    battle.classList.remove('hidden');
                } else {
                    map.classList.remove('hidden');
                    battle.classList.add('hidden');
                    this.renderBuildingList();
                    this.renderGrid();
                }
                this.updateUI();
            },

            renderBuildingList() {
                const side = this.state.activeScene;
                if (side === 'battle') return;
                const listEl = document.getElementById('ui-building-list');
                const cfg = this.config[side];
                
                listEl.innerHTML = Object.entries(cfg).map(([key, b]) => {
                    const sel = this.state[side].selected === key;
                    const costStr = Object.entries(b.cost).map(([r, v]) => `${v}${r==='wood'?'🪵':r==='stone'?'🪨':r==='bone'?'💀':'🌀'}`).join(' ');
                    return `
                        <div onclick="Game.selectBuilding('${key}')" class="bld-card p-4 rounded-2xl cursor-pointer ${sel?'selected':''}">
                            <div class="flex items-center gap-3">
                                <div class="text-2xl">${b.icon}</div>
                                <div class="flex-1">
                                    <div class="stat-font text-[10px] text-white font-bold">${b.name}</div>
                                    <div class="mono text-[8px] text-slate-500">Cost: ${costStr}</div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            },

            selectBuilding(key) {
                const side = this.state.activeScene;
                this.state[side].selected = (this.state[side].selected === key) ? null : key;
                this.renderBuildingList();
                this.renderGrid();
            },

            renderGrid() {
                const side = this.state.activeScene;
                if (side === 'battle') return;
                const gridEl = document.getElementById('ui-map-grid');
                gridEl.innerHTML = '';
                
                const s = this.state[side];
                const cfg = this.config[side];

                s.grid.forEach((item, i) => {
                    const cell = document.createElement('div');
                    const isFertile = s.fertility.includes(i);
                    cell.className = `anno-cell ${isFertile?'fertile':''}`;
                    
                    if (item) {
                        cell.innerText = cfg[item].icon;
                        cell.classList.add('building-pop');
                    } else if (s.selected) {
                        cell.classList.add('preview');
                        cell.setAttribute('data-icon', cfg[s.selected].icon);
                    }

                    cell.onclick = () => this.placeBuilding(i);
                    cell.oncontextmenu = (e) => { e.preventDefault(); this.demolish(i); };
                    gridEl.appendChild(cell);
                });
            },

            placeBuilding(idx) {
                const side = this.state.activeScene;
                const s = this.state[side];
                const type = s.selected;
                if (!type) return;
                if (s.grid[idx]) return;

                const cost = this.config[side][type].cost;
                for (let r in cost) {
                    if (s[r] < cost[r]) return alert("Insufficient resources!");
                }

                for (let r in cost) s[r] -= cost[r];
                s.grid[idx] = type;
                s.buildings[type]++;
                this.log(`Construction complete: ${type} at Sector ${idx}.`);
                this.renderGrid();
                this.updateUI();
            },

            demolish(idx) {
                const side = this.state.activeScene;
                const type = this.state[side].grid[idx];
                if (!type) return;
                this.state[side].grid[idx] = null;
                this.state[side].buildings[type]--;
                this.log(`Demolished ${type} at Sector ${idx}. Resources recycled.`);
                this.renderGrid();
                this.updateUI();
            },

            updateSliders() {
                const t = document.getElementById('input-true').value;
                const f = document.getElementById('input-funny').value;
                document.getElementById('ui-val-true').innerText = `${t}%`;
                document.getElementById('ui-val-funny').innerText = `${f}%`;
            },

            executeSupply() {
                if (this.state.battle.isGameOver) return;
                const target = this.state.activeScene;
                const t = document.getElementById('input-true').value / 100;
                const f = document.getElementById('input-funny').value / 100;
                const fake = Math.max(0, 1 - t - f);

                this.log(`Convoy dispatched to ${target} front. ETA: 3s.`);
                setTimeout(() => {
                    if (this.state.battle.isGameOver) return;
                    const sideKey = target === 'human' ? 'hForce' : 'dForce';
                    this.state.battle[sideKey] += (t * 150) + (fake * 200);
                    
                    setTimeout(() => {
                        this.state.battle[sideKey] -= (fake * 250);
                        if (fake > 0.2) this.log(`Supply Alert: Fake goods detected in ${target} camp! Morale collapsing.`);
                        this.updateUI();
                    }, 5000);

                    const saved = Math.floor(f * 40);
                    if (saved > 0) {
                        this.state[target].pop += saved;
                        this.state[target].tiers[target === 'human' ? 'peasant' : 'slave'] += saved;
                        this.state.battle.peaceScore += saved * 10;
                        this.log(`Miracle: ${saved} deserters joined the ${target} colony.`);
                    }
                    this.updateUI();
                }, 3000);
            },

            updateUI() {
                const side = this.state.activeScene;
                const b = this.state.battle;
                
                // Top bar
                document.getElementById('ui-res-food').innerText = Math.floor(this.state.human.food);
                document.getElementById('ui-res-wood').innerText = Math.floor(this.state.human.wood);
                document.getElementById('ui-res-stone').innerText = Math.floor(this.state.human.stone);
                document.getElementById('ui-res-meat').innerText = Math.floor(this.state.demon.meat);
                document.getElementById('ui-res-bone').innerText = Math.floor(this.state.demon.bone);
                document.getElementById('ui-res-mana').innerText = Math.floor(this.state.demon.mana);
                document.getElementById('ui-peace-score').innerText = b.peaceScore;

                // Sidebar
                if (side !== 'battle') {
                    const s = this.state[side];
                    document.getElementById('ui-pop-count').innerText = `${s.pop} / ${s.pop * 2}`;
                    document.getElementById('ui-pop-fill').style.width = '40%';
                    document.getElementById('ui-pop-tiers').innerHTML = side === 'human' 
                        ? `<div>PEASANTS: ${s.tiers.peasant}</div><div>CITIZENS: ${s.tiers.citizen}</div>`
                        : `<div>SLAVES: ${s.tiers.slave}</div><div>LORDS: ${s.tiers.lord}</div>`;
                    
                    document.getElementById('ui-force-display').innerText = `FORCE: ${Math.floor(b[side==='human'?'hForce':'dForce'])}`;
                }

                // Battle
                const total = b.hForce + b.dForce;
                const balance = (b.hForce / total) * 100;
                document.getElementById('ui-balance-bar').style.width = `${balance}%`;
                document.getElementById('unit-human').style.left = `${balance * 0.7}%`;
                document.getElementById('unit-demon').style.right = `${(100 - balance) * 0.7}%`;
            },

            log(msg) {
                const el = document.getElementById('ui-log');
                if (!el) return;
                const p = document.createElement('p');
                p.innerHTML = `<span class="text-white/20">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
                el.prepend(p);
            },

            loop() {
                setInterval(() => {
                    if (this.state.battle.isGameOver) return;
                    const h = this.state.human, d = this.state.demon, b = this.state.battle;

                    // Anno-style Consumption & Growth
                    h.food -= h.pop * 0.08;
                    if (h.buildings.farm >= 2 && h.food > 300 && h.tiers.peasant > 0) { h.tiers.peasant--; h.tiers.citizen++; }
                    if (h.food < 0) { h.food = 0; if (h.pop > 10) h.pop--; }
                    
                    const hMult = 1 + (h.tiers.peasant + h.tiers.citizen*3)/500;
                    h.food += (h.pop * 0.1 + h.buildings.farm * 4) * hMult;
                    h.wood += (h.pop * 0.05 + h.buildings.sawmill * 3) * hMult;
                    h.stone += (h.pop * 0.02 + h.buildings.quarry * 2) * hMult;

                    d.meat -= d.pop * 0.1;
                    if (d.buildings.altar >= 2 && d.bone > 300 && d.tiers.slave > 0) { d.tiers.slave--; d.tiers.lord++; }
                    
                    const dMult = 1 + (d.tiers.slave + d.tiers.lord*4)/500;
                    d.meat += (d.pop * 0.1 + d.buildings.pit * 4) * dMult;
                    d.bone += (d.pop * 0.05 + d.buildings.rift * 3) * dMult;
                    d.mana += (d.pop * 0.02 + d.buildings.altar * 2) * dMult;

                    // World Drift
                    b.hForce += (Math.random() * 8 - 4);
                    b.dForce += (Math.random() * 8 - 4);

                    this.updateUI();
                }, 1000);
            }
        };

        Game.init();
    </script>
</body>
</html>
