<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeaceCraft - Anno Fix v4.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0806; --bg-panel: #1c1814; --bg-card: #2a241e;
            --gold: #c9a84c; --gold-bright: #e8c84a; --border: #3d3529;
        }
        body { font-family: 'Crimson Pro', serif; background-color: var(--bg-dark); color: #d4c5a9; overflow: hidden; margin: 0; user-select: none; }
        .stat-font { font-family: 'Cinzel', serif; }
        #game-container { display: flex; width: 100vw; height: 100vh; }
        #sidebar { width: 320px; background: var(--bg-panel); border-right: 2px solid var(--border); display: flex; flex-direction: column; z-index: 50; }
        #main-area { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        #top-bar { height: 60px; background: #1a1612; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 40; }
        #canvas-viewport { flex: 1; position: relative; background: #000; }
        canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
        .bld-item { 
            aspect-ratio: 1; background: var(--bg-card); border: 1px solid var(--border); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: all 0.2s; cursor: pointer; border-radius: 4px;
        }
        .bld-item.selected { border-color: var(--gold-bright); box-shadow: 0 0 10px rgba(201,168,76,0.3); }
        .tab-btn { font-family: 'Cinzel'; font-size: 10px; letter-spacing: 1px; color: #8a7e6a; }
        .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .anno-toast {
            position: absolute; top: 80px; right: 20px; background: #1c1814;
            border-left: 4px solid var(--gold); padding: 12px 20px; font-size: 12px;
            transform: translateX(150%); transition: transform 0.3s ease; z-index: 100;
        }
        .anno-toast.show { transform: translateX(0); }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="sidebar">
            <div class="p-6 border-b border-white/5 text-center">
                <h1 class="stat-font text-gold text-xl tracking-[4px] font-black">ANNO: PEACECRAFT</h1>
            </div>
            <div class="p-6 space-y-4">
                <div class="flex justify-between text-[10px] uppercase font-bold text-slate-500">
                    <span>Empire Pop</span>
                    <span id="ui-pop-count" class="text-gold">0</span>
                </div>
                <div class="h-1 bg-black/40 rounded-full overflow-hidden">
                    <div id="ui-pop-bar" class="h-full bg-gold transition-all" style="width: 0%"></div>
                </div>
                <div id="ui-pop-tiers" class="text-[10px] space-y-1 text-slate-400"></div>
                <div class="pt-4 border-t border-white/5">
                    <div class="flex gap-2 mb-4 bg-black/20 p-1 rounded">
                        <button onclick="Game.switchTab('raw')" id="tab-raw" class="flex-1 py-1 tab-btn active uppercase">Industry</button>
                        <button onclick="Game.switchTab('civil')" id="tab-civil" class="flex-1 py-1 tab-btn uppercase">Civil</button>
                    </div>
                    <div id="bld-grid" class="grid grid-cols-3 gap-2"></div>
                </div>
            </div>
            <div class="mt-auto p-6 border-t border-white/5 bg-black/20">
                <button onclick="Game.switchScene('battle')" class="w-full py-3 bg-slate-800 text-white stat-font text-[10px] tracking-widest hover:bg-slate-700">WAR THEATER</button>
            </div>
        </div>
        <div id="main-area">
            <div id="top-bar" class="justify-between">
                <div class="flex gap-8">
                    <button onclick="Game.switchScene('human')" id="scene-human" class="stat-font text-[10px] tracking-widest text-gold font-bold">ALLIANCE</button>
                    <button onclick="Game.switchScene('demon')" id="scene-demon" class="stat-font text-[10px] tracking-widest text-slate-500 font-bold">LEGION</button>
                </div>
                <div id="res-bar" class="flex gap-6 items-center text-[11px] mono"></div>
                <div class="text-right">
                    <span class="text-[9px] text-slate-500 uppercase font-bold block">Peace Score</span>
                    <span id="ui-peace" class="text-gold font-black stat-font text-lg">0</span>
                </div>
            </div>
            <div id="canvas-viewport">
                <canvas id="gameCanvas"></canvas>
                <!-- Supply Overlay -->
                <div id="supply-ui" class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-[#1c1814]/95 border border-[#3d3529] p-6 w-[500px] shadow-2xl">
                    <div class="flex justify-between mb-4 border-b border-white/5 pb-2">
                        <span id="ui-force-side" class="stat-font text-[10px] text-gold uppercase tracking-widest">Supply Chain</span>
                        <span id="ui-force-val" class="mono text-white text-xl">500</span>
                    </div>
                    <div class="grid grid-cols-2 gap-8 mb-4">
                        <input type="range" id="in-true" oninput="Game.upSlid()" class="w-full accent-gold">
                        <input type="range" id="in-funny" oninput="Game.upSlid()" class="w-full accent-gold">
                    </div>
                    <button onclick="Game.dispatch()" class="w-full py-3 bg-gold text-black font-black uppercase text-[10px] tracking-widest">Execute Logistics</button>
                </div>
                <!-- Battle View -->
                <div id="battle-view" class="hidden absolute inset-0 bg-[#0a0806]/95 flex flex-col items-center justify-center space-y-12">
                    <div class="w-full max-w-2xl text-center space-y-4">
                        <div class="stat-font text-[10px] text-slate-500 tracking-[0.5em] uppercase">Global Balance</div>
                        <div class="h-1 bg-white/5 rounded-full overflow-hidden"><div id="ui-balance" class="h-full bg-gold transition-all duration-1000" style="width: 50%"></div></div>
                    </div>
                    <div class="flex items-center justify-around w-full px-20">
                        <div id="unit-h" class="text-5xl opacity-50 transition-all duration-1000">🛡️</div>
                        <div class="stat-font text-white/5 text-8xl italic">VS</div>
                        <div id="unit-d" class="text-5xl opacity-50 transition-all duration-1000">🔥</div>
                    </div>
                    <div id="ui-log" class="w-full max-w-xl h-32 bg-black/40 p-4 overflow-y-auto mono text-[9px] text-slate-600"></div>
                </div>
            </div>
        </div>
    </div>
    <div id="anno-toast" class="anno-toast stat-font text-gold">Imperial Message</div>
    <script>
        const TILE = 48; const MAP_SZ = 40;
        const Game = {
            state: {
                human: { pop: 100, tiers: { peasant: 100, citizen: 0 }, food: 500, wood: 200, stone: 100, placed: [], camera: { x: 800, y: 800 }, selected: null },
                demon: { pop: 100, tiers: { slave: 100, lord: 0 }, meat: 500, bone: 200, mana: 100, placed: [], camera: { x: 800, y: 800 }, selected: null },
                battle: { hForce: 500, dForce: 500, peace: 0 },
                scene: 'human', tab: 'raw', mouse: { x: 0, y: 0, gx: 0, gy: 0 }, drag: null
            },
            config: {
                human: { farm: { icon: '🌾', size: [2,2], cat: 'raw', cost: { wood: 50 }, prod: { out: 'food', val: 8 } }, sawmill: { icon: '🪚', size: [1,1], cat: 'raw', cost: { stone: 80 }, prod: { out: 'wood', val: 5 } }, quarry: { icon: '⛏️', size: [2,1], cat: 'raw', cost: { wood: 120 }, prod: { out: 'stone', val: 3 } } },
                demon: { pit: { icon: '🥩', size: [2,2], cat: 'raw', cost: { bone: 50 }, prod: { out: 'meat', val: 8 } }, altar: { icon: '💀', size: [1,1], cat: 'raw', cost: { mana: 80 }, prod: { out: 'bone', val: 5 } }, rift: { icon: '🌀', size: [2,1], cat: 'raw', cost: { bone: 120 }, prod: { out: 'mana', val: 3 } } }
            },
            init() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                window.addEventListener('resize', () => this.resize()); this.resize();
                this.canvas.addEventListener('mousedown', e => this.onDown(e));
                window.addEventListener('mousemove', e => this.onMove(e));
                window.addEventListener('mouseup', () => this.state.drag = null);
                this.canvas.addEventListener('contextmenu', e => { e.preventDefault(); this.demolish(); });
                this.renderBldGrid(); this.loop(); requestAnimationFrame(t => this.draw(t));
                this.toast("ENGINE RECOVERED");
            },
            resize() { 
                const rect = this.canvas.parentElement.getBoundingClientRect();
                this.canvas.width = rect.width; this.canvas.height = rect.height;
            },
            toast(msg) {
                const t = document.getElementById('anno-toast'); t.innerText = msg; t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 3000);
            },
            switchScene(s) {
                this.state.scene = s;
                document.querySelectorAll('#top-bar button').forEach(b => b.classList.replace('text-gold', 'text-slate-500'));
                if (s !== 'battle') document.getElementById(`scene-${s}`).classList.replace('text-slate-500', 'text-gold');
                document.getElementById('battle-view').classList.toggle('hidden', s !== 'battle');
                document.getElementById('supply-ui').classList.toggle('hidden', s === 'battle');
                this.renderBldGrid(); this.updateUI();
            },
            switchTab(t) {
                this.state.tab = t; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`tab-${t}`).classList.add('active'); this.renderBldGrid();
            },
            renderBldGrid() {
                const s = this.state.scene; if (s === 'battle') return;
                const el = document.getElementById('bld-grid'); el.innerHTML = '';
                Object.entries(this.config[s]).forEach(([k, b]) => {
                    if (b.cat !== this.state.tab) return;
                    const item = document.createElement('div');
                    item.className = `bld-item ${this.state[s].selected === k ? 'selected' : ''}`;
                    item.innerHTML = `<span class="text-xl">${b.icon}</span>`;
                    item.onclick = () => { this.state[s].selected = (this.state[s].selected === k) ? null : k; this.renderBldGrid(); };
                    el.appendChild(item);
                });
            },
            onDown(e) {
                if (e.button === 0) {
                    if (this.state[this.state.scene]?.selected) this.place();
                    else this.state.drag = { x: e.clientX, y: e.clientY, camX: this.state[this.state.scene].camera.x, camY: this.state[this.state.scene].camera.y };
                }
            },
            onMove(e) {
                const rect = this.canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left, my = e.clientY - rect.top;
                this.state.mouse.x = mx; this.state.mouse.y = my;
                const cur = this.state[this.state.scene];
                if (this.state.drag && cur) {
                    cur.camera.x = this.state.drag.camX - (e.clientX - this.state.drag.x);
                    cur.camera.y = this.state.drag.camY - (e.clientY - this.state.drag.y);
                    const max = MAP_SZ * TILE;
                    cur.camera.x = Math.max(0, Math.min(max - this.canvas.width, cur.camera.x));
                    cur.camera.y = Math.max(0, Math.min(max - this.canvas.height, cur.camera.y));
                }
                if (cur) {
                    this.state.mouse.gx = Math.floor((mx + cur.camera.x) / TILE);
                    this.state.mouse.gy = Math.floor((my + cur.camera.y) / TILE);
                }
            },
            place() {
                const s = this.state.scene; const cur = this.state[s];
                const type = cur.selected; const b = this.config[s][type];
                const gx = this.state.mouse.gx, gy = this.state.mouse.gy;
                if (gx < 2 || gy < 2 || gx + b.size[0] > MAP_SZ - 2 || gy + b.size[1] > MAP_SZ - 2) return;
                for(let p of cur.placed) {
                    const pb = this.config[s][p.type];
                    if (!(gx + b.size[0] <= p.gx || gx >= p.gx + pb.size[0] || gy + b.size[1] <= p.gy || gy >= p.gy + pb.size[1])) return;
                }
                for(let r in b.cost) if (cur[r] < b.cost[r]) return;
                for(let r in b.cost) cur[r] -= b.cost[r];
                cur.placed.push({ type, gx, gy }); this.updateUI();
            },
            demolish() {
                const s = this.state.scene; const cur = this.state[s];
                const gx = this.state.mouse.gx, gy = this.state.mouse.gy;
                const idx = cur.placed.findIndex(p => {
                    const pb = this.config[s][p.type];
                    return gx >= p.gx && gx < p.gx + pb.size[0] && gy >= p.gy && gy < p.gy + pb.size[1];
                });
                if (idx !== -1) { 
                    const p = cur.placed[idx]; for(let r in this.config[s][p.type].cost) cur[r] += Math.floor(this.config[s][p.type].cost[r] * 0.5);
                    cur.placed.splice(idx, 1); this.updateUI(); 
                }
            },
            upSlid() {
                document.getElementById('v-true').innerText = document.getElementById('in-true').value + '%';
                document.getElementById('v-funny').innerText = document.getElementById('in-funny').value + '%';
            },
            dispatch() {
                const s = this.state.scene; this.log(`Supply convoy dispatched.`);
                setTimeout(() => {
                    this.state.battle[s === 'human' ? 'hForce' : 'dForce'] += 150;
                    this.toast("SUPPLY DELIVERED"); this.updateUI();
                }, 2000);
            },
            draw() {
                const s = this.state.scene; if (s === 'battle') { requestAnimationFrame(t => this.draw(t)); return; }
                const ctx = this.ctx; const cur = this.state[s]; const cam = cur.camera;
                ctx.clearRect(0,0,this.canvas.width, this.canvas.height);
                for(let y=0; y<MAP_SZ; y++) {
                    for(let x=0; x<MAP_SZ; x++) {
                        const sx = x*TILE - cam.x, sy = y*TILE - cam.y;
                        if (sx < -TILE || sy < -TILE || sx > this.canvas.width || sy > this.canvas.height) continue;
                        const water = x < 2 || y < 2 || x > MAP_SZ-3 || y > MAP_SZ-3;
                        ctx.fillStyle = water ? '#08121a' : ((x+y)%2 ? '#1a1f14' : '#161a10');
                        ctx.fillRect(sx, sy, TILE, TILE);
                        ctx.strokeStyle = 'rgba(255,255,255,0.02)'; ctx.strokeRect(sx, sy, TILE, TILE);
                    }
                }
                cur.placed.forEach(p => {
                    const b = this.config[s][p.type];
                    const sx = p.gx*TILE - cam.x, sy = p.gy*TILE - cam.y;
                    const w = b.size[0]*TILE, h = b.size[1]*TILE;
                    ctx.fillStyle = '#2a241e'; ctx.fillRect(sx+2, sy+2, w-4, h-4);
                    ctx.strokeStyle = '#c9a84c44'; ctx.strokeRect(sx+4, sy+4, w-8, h-8);
                    ctx.fillStyle = 'white'; ctx.font = '24px serif'; ctx.textAlign = 'center';
                    ctx.fillText(b.icon, sx + w/2, sy + h/2 + 8);
                });
                if (cur.selected) {
                    const b = this.config[s][cur.selected];
                    ctx.globalAlpha = 0.2; ctx.fillStyle = '#c9a84c';
                    ctx.fillRect(this.state.mouse.gx*TILE - cam.x, this.state.mouse.gy*TILE - cam.y, b.size[0]*TILE, b.size[1]*TILE);
                    ctx.globalAlpha = 1;
                }
                requestAnimationFrame(t => this.draw(t));
            },
            log(m) {
                const l = document.getElementById('ui-log'); const p = document.createElement('p');
                p.innerHTML = `<span class="text-white/10">[LOG]</span> ${m}`; l.prepend(p);
            },
            updateUI() {
                const s = this.state.scene; const cur = this.state[s];
                const h = this.state.human, d = this.state.demon, b = this.state.battle;
                const resEl = document.getElementById('res-bar');
                resEl.innerHTML = s === 'human' ? `<span>🌾 ${Math.floor(h.food)}</span><span>🪵 ${Math.floor(h.wood)}</span><span>🪨 ${Math.floor(h.stone)}</span>` : 
                                                 `<span>🥩 ${Math.floor(d.meat)}</span><span>💀 ${Math.floor(d.bone)}</span><span>🌀 ${Math.floor(d.mana)}</span>`;
                document.getElementById('ui-pop-count').innerText = Math.floor(h.pop + d.pop);
                document.getElementById('ui-pop-bar').style.width = Math.min(100, (h.pop+d.pop)/20) + '%';
                document.getElementById('ui-peace').innerText = b.peace;
                const balance = (b.hForce / (b.hForce + b.dForce)) * 100;
                document.getElementById('ui-balance').style.width = `${balance}%`;
                document.getElementById('ui-force-val').innerText = Math.floor(b[s === 'human' ? 'hForce' : 'dForce']);
            },
            loop() {
                setInterval(() => {
                    const h = this.state.human, d = this.state.demon, b = this.state.battle;
                    h.food -= h.pop * 0.03; d.meat -= d.pop * 0.03;
                    h.placed.forEach(p => h[this.config.human[p.type].prod.out] += this.config.human[p.type].prod.val);
                    d.placed.forEach(p => d[this.config.demon[p.type].prod.out] += this.config.demon[p.type].prod.val);
                    b.hForce += (Math.random()*4 - 2); b.dForce += (Math.random()*4 - 2);
                    this.updateUI();
                }, 1000);
            }
        };
        Game.init();
    </script>
</body>
</html>
