<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeaceCraft - 天平之祭 (Anno Logic Fixed)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1612; --bg-panel: #231f1a; --bg-card: #2c2620;
            --gold: #c9a84c; --gold-bright: #e8c84a; --border: #3d3529;
        }
        body { font-family: 'Crimson Pro', serif; background-color: var(--bg-dark); color: #d4c5a9; overflow: hidden; margin: 0; }
        .stat-font { font-family: 'Cinzel', serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        #game-container { display: flex; width: 100vw; height: 100vh; }
        #sidebar { width: 300px; min-width: 300px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        #main-area { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        canvas { display: block; background: #1e3a52; cursor: crosshair; }

        .tab-btn { font-family: 'Cinzel', serif; letter-spacing: 1px; color: #8a7e6a; transition: all 0.2s; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

        .bld-card { background: var(--bg-card); border: 1px solid var(--border); transition: all 0.15s; cursor: pointer; }
        .bld-card:hover { background: #362f28; border-color: #544a3c; }
        .bld-card.selected { border-color: var(--gold); box-shadow: 0 0 12px rgba(201,168,76,0.15); background: #362f28; }
        
        #ui-log::-webkit-scrollbar { width: 4px; }
        #ui-log::-webkit-scrollbar-thumb { background: var(--border); }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="sidebar">
            <div class="p-6 border-b border-white/5">
                <h1 class="stat-font text-gold text-xl tracking-[4px] font-bold">PEACECRAFT</h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Refined Colony Logic</p>
            </div>

            <div class="p-6 border-b border-white/5">
                <div class="flex justify-between text-[10px] uppercase font-bold text-slate-500 mb-2">
                    <span id="ui-side-label">Alliance Pop</span>
                    <span id="ui-pop-val" class="text-gold mono">0 / 0</span>
                </div>
                <div class="h-1 bg-black/40 rounded-full overflow-hidden">
                    <div id="ui-pop-bar" class="h-full bg-gold w-0 transition-all"></div>
                </div>
                <div id="ui-tiers" class="mt-4 space-y-1 text-[10px] mono text-slate-400"></div>
            </div>

            <div class="flex border-b border-white/5 bg-black/10">
                <button onclick="Game.switchTab('raw')" id="tab-raw" class="flex-1 py-3 text-[10px] font-black uppercase tab-btn active">Production</button>
                <button onclick="Game.switchTab('civil')" id="tab-civil" class="flex-1 py-3 text-[10px] font-black uppercase tab-btn">Civil</button>
            </div>

            <div id="bld-list" class="flex-1 overflow-y-auto p-4 space-y-3"></div>

            <div class="p-4 bg-black/20 text-[10px] text-center border-t border-white/5 mono text-slate-600">
                L-CLICK TO BUILD • R-CLICK TO DEMOLISH • DRAG TO PAN
            </div>
        </div>

        <div id="main-area">
            <div class="h-14 bg-slate-900/90 border-b border-border flex items-center px-6 gap-6 z-20">
                <nav class="flex gap-6 mr-8">
                    <button onclick="Game.switchScene('human')" id="scene-human" class="tab-btn active text-xs font-bold uppercase">Alliance</button>
                    <button onclick="Game.switchScene('demon')" id="scene-demon" class="tab-btn text-xs font-bold uppercase">Legion</button>
                    <button onclick="Game.switchScene('battle')" id="scene-battle" class="tab-btn text-xs font-bold uppercase">Battlefield</button>
                </nav>
                
                <div id="ui-res-row" class="flex gap-4 mono text-[11px] items-center">
                    <!-- Res icons injected by JS -->
                </div>

                <div class="flex-1"></div>
                <div id="ui-peace-container" class="text-right">
                    <div class="text-[9px] text-slate-500 uppercase font-bold mono">Peace score</div>
                    <div id="ui-peace" class="text-gold font-bold stat-font">0</div>
                </div>
            </div>

            <div id="viewport" class="flex-1 relative overflow-hidden bg-[#1e3a52]">
                <canvas id="gameCanvas"></canvas>
                
                <div id="supply-ui" class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-slate-900/90 p-6 rounded-3xl border border-white/10 backdrop-blur-xl shadow-2xl w-[500px]">
                    <div class="flex justify-between mb-4 items-center">
                        <span id="ui-force-side" class="stat-font text-xs uppercase text-gold">Alliance Front</span>
                        <span id="ui-force-val" class="mono text-white text-lg">500</span>
                    </div>
                    <div class="grid grid-cols-2 gap-8">
                        <div class="space-y-2">
                            <div class="flex justify-between text-[9px] mono"><span>Steel Weapons</span><span id="v-true">50%</span></div>
                            <input type="range" id="in-true" oninput="Game.upSlid()" class="w-full accent-gold h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer">
                        </div>
                        <div class="space-y-2">
                            <div class="flex justify-between text-[9px] mono"><span>Funny Gags</span><span id="v-funny">50%</span></div>
                            <input type="range" id="in-funny" oninput="Game.upSlid()" class="w-full accent-gold h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer">
                        </div>
                    </div>
                    <button onclick="Game.dispatch()" class="w-full mt-6 py-3 bg-gold hover:bg-gold-bright text-slate-900 font-black rounded-xl uppercase text-xs transition-all">Dispatch Convoy</button>
                </div>

                <div id="battle-view" class="hidden absolute inset-0 bg-black/60 flex flex-col items-center justify-center p-12 space-y-12">
                    <div class="w-full max-w-2xl text-center space-y-4">
                        <div class="stat-font text-xs tracking-[0.5em] text-slate-500 uppercase">Universal Balance</div>
                        <div class="relative h-14 bg-black/80 rounded-2xl border-2 border-slate-800 overflow-hidden">
                            <div id="ui-balance" class="h-full bg-gradient-to-r from-blue-600 via-gold to-red-600 transition-all duration-700" style="width: 50%"></div>
                        </div>
                    </div>
                    <div class="relative w-full h-64 flex items-center justify-center">
                        <div id="unit-h" class="absolute w-24 h-24 bg-blue-600/20 border-2 border-blue-500 rounded-3xl flex items-center justify-center text-4xl transition-all duration-1000" style="left: 20%">🛡️</div>
                        <div class="text-slate-800 font-black text-8xl opacity-10 italic">VS</div>
                        <div id="unit-d" class="absolute w-24 h-24 bg-red-600/20 border-2 border-red-500 rounded-3xl flex items-center justify-center text-4xl transition-all duration-1000" style="right: 20%">🔥</div>
                    </div>
                    <div id="ui-log" class="w-full max-w-2xl h-40 bg-black/60 rounded-2xl p-6 overflow-y-auto mono text-[10px] text-slate-500 border border-white/5 scroll-smooth"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TILE = 40; const MAP_SZ = 40;
        const Game = {
            state: {
                human: { pop: 100, tiers: { peasant: 100, citizen: 0 }, food: 500, wood: 200, stone: 100, placed: [], camera: { x: 600, y: 600 }, selected: null },
                demon: { pop: 100, tiers: { slave: 100, lord: 0 }, meat: 500, bone: 200, mana: 100, placed: [], camera: { x: 600, y: 600 }, selected: null },
                battle: { hForce: 500, dForce: 500, peace: 0 },
                scene: 'human', tab: 'raw', mouse: { x: 0, y: 0, gx: 0, gy: 0 }, drag: null
            },

            config: {
                human: {
                    farm: { name: 'Farm', icon: '🌾', size: [2,2], cat: 'raw', cost: { wood: 50 }, prod: { out: 'food', val: 5 } },
                    sawmill: { name: 'Sawmill', icon: '🪚', size: [1,1], cat: 'raw', cost: { stone: 80 }, prod: { out: 'wood', val: 3 } },
                    quarry: { name: 'Quarry', icon: '⛏️', size: [2,1], cat: 'raw', cost: { wood: 120 }, prod: { out: 'stone', val: 2 } }
                },
                demon: {
                    pit: { name: 'Flesh Pit', icon: '🥩', size: [2,2], cat: 'raw', cost: { bone: 50 }, prod: { out: 'meat', val: 5 } },
                    altar: { name: 'Altar', icon: '💀', size: [1,1], cat: 'raw', cost: { mana: 80 }, prod: { out: 'bone', val: 3 } },
                    rift: { name: 'Void Rift', icon: '🌀', size: [2,1], cat: 'raw', cost: { bone: 120 }, prod: { out: 'mana', val: 2 } }
                }
            },

            init() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                window.addEventListener('resize', () => this.resize());
                this.resize();
                
                this.canvas.addEventListener('mousedown', e => this.onDown(e));
                window.addEventListener('mousemove', e => this.onMove(e));
                window.addEventListener('mouseup', e => this.onUp(e));
                this.canvas.addEventListener('contextmenu', e => { e.preventDefault(); this.demolish(); });

                this.renderBldList();
                this.loop();
                requestAnimationFrame(t => this.draw(t));
                this.log("Dragon King, the balance is yours to hold.");
            },

            resize() {
                const rect = this.canvas.parentElement.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
            },

            switchScene(s) {
                this.state.scene = s;
                document.querySelectorAll('nav .tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`scene-${s}`).classList.add('active');
                document.getElementById('battle-view').classList.toggle('hidden', s !== 'battle');
                document.getElementById('supply-ui').classList.toggle('hidden', s === 'battle');
                this.renderBldList();
                this.updateUI();
            },

            switchTab(t) {
                this.state.tab = t;
                document.querySelectorAll('#sidebar .tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`tab-${t}`).classList.add('active');
                this.renderBldList();
            },

            renderBldList() {
                const s = this.state.scene; if (s === 'battle') return;
                const el = document.getElementById('bld-list'); el.innerHTML = '';
                Object.entries(this.config[s]).forEach(([k, b]) => {
                    if (b.cat !== this.state.tab) return;
                    const card = document.createElement('div');
                    card.className = `bld-card p-4 rounded-xl flex items-center gap-4 ${this.state[s].selected === k ? 'selected' : ''}`;
                    const costKey = Object.keys(b.cost)[0];
                    const costVal = b.cost[costKey];
                    card.innerHTML = `<div class="text-2xl">${b.icon}</div><div><div class="stat-font text-[10px] text-white font-bold">${b.name}</div><div class="mono text-[8px] text-slate-500">${b.size[0]}x${b.size[1]} • Cost: ${costVal} ${costKey}</div></div>`;
                    card.onclick = () => { this.state[s].selected = this.state[s].selected === k ? null : k; this.renderBldList(); };
                    el.appendChild(card);
                });
            },

            onDown(e) {
                const rect = this.canvas.getBoundingClientRect();
                if (e.button === 0) {
                    if (this.state[this.state.scene]?.selected) {
                        this.place();
                    } else {
                        this.state.drag = { x: e.clientX, y: e.clientY, camX: this.state[this.state.scene].camera.x, camY: this.state[this.state.scene].camera.y };
                    }
                }
            },

            onMove(e) {
                const rect = this.canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left, my = e.clientY - rect.top;
                this.state.mouse.x = mx; this.state.mouse.y = my;
                
                const cur = this.state[this.state.scene];
                if (this.state.drag && cur) {
                    cur.camera.x = this.state.drag.camX - (e.clientX - this.state.drag.x);
                    cur.camera.y = this.state.drag.camY - (e.clientY - this.state.drag.y);
                    const max = MAP_SZ * TILE;
                    cur.camera.x = Math.max(0, Math.min(max - this.canvas.width, cur.camera.x));
                    cur.camera.y = Math.max(0, Math.min(max - this.canvas.height, cur.camera.y));
                }
                if (cur) {
                    this.state.mouse.gx = Math.floor((mx + cur.camera.x) / TILE);
                    this.state.mouse.gy = Math.floor((my + cur.camera.y) / TILE);
                }
            },

            onUp() { this.state.drag = null; },

            place() {
                const s = this.state.scene; const cur = this.state[s];
                const type = cur.selected; const b = this.config[s][type];
                const gx = this.state.mouse.gx, gy = this.state.mouse.gy;
                
                if (gx < 2 || gy < 2 || gx + b.size[0] > MAP_SZ - 2 || gy + b.size[1] > MAP_SZ - 2) return;

                for(let p of cur.placed) {
                    const pb = this.config[s][p.type];
                    if (!(gx + b.size[0] <= p.gx || gx >= p.gx + pb.size[0] || gy + b.size[1] <= p.gy || gy >= p.gy + pb.size[1])) return;
                }
                
                for(let r in b.cost) if (cur[r] < b.cost[r]) return;
                for(let r in b.cost) cur[r] -= b.cost[r];
                
                cur.placed.push({ type, gx, gy });
                this.log(`Building ${b.name} established.`);
                this.updateUI();
            },

            demolish() {
                const s = this.state.scene; const cur = this.state[s];
                const gx = this.state.mouse.gx, gy = this.state.mouse.gy;
                const idx = cur.placed.findIndex(p => {
                    const pb = this.config[s][p.type];
                    return gx >= p.gx && gx < p.gx + pb.size[0] && gy >= p.gy && gy < p.gy + pb.size[1];
                });
                if (idx !== -1) { 
                    const p = cur.placed[idx]; const b = this.config[s][p.type];
                    for(let r in b.cost) cur[r] += Math.floor(b.cost[r] * 0.5);
                    cur.placed.splice(idx, 1); 
                    this.log("Structure dismantled. Resources salvaged."); 
                    this.updateUI(); 
                }
            },

            upSlid() {
                document.getElementById('v-true').innerText = document.getElementById('in-true').value + '%';
                document.getElementById('v-funny').innerText = document.getElementById('in-funny').value + '%';
            },

            dispatch() {
                const s = this.state.scene; const b = this.state.battle;
                const t = document.getElementById('in-true').value / 100;
                const f = document.getElementById('in-funny').value / 100;
                const fake = Math.max(0, 1 - t - f);

                this.log(`Convoy dispatched to the ${s} front.`);
                setTimeout(() => {
                    const key = s === 'human' ? 'hForce' : 'dForce';
                    b[key] += (t * 150) + (fake * 200);
                    setTimeout(() => {
                        b[key] -= (fake * 250);
                        if (fake > 0.2) this.log(`⚠️ Warning: Fake goods sabotage in ${s} camp!`);
                        this.updateUI();
                    }, 5000);
                    const saved = Math.floor(f * 40);
                    if (saved > 0) {
                        this.state[s].pop += saved;
                        this.state[s].tiers[s === 'human' ? 'peasant' : 'slave'] += saved;
                        b.peace += saved * 10;
                        this.log(`✨ ${saved} souls were spared and joined your colony.`);
                    }
                    this.updateUI();
                }, 2000);
            },

            draw() {
                const s = this.state.scene; if (s === 'battle') { requestAnimationFrame(t => this.draw(t)); return; }
                const ctx = this.ctx; const cur = this.state[s]; const cam = cur.camera;
                ctx.clearRect(0,0,this.canvas.width, this.canvas.height);
                
                for(let y=0; y<MAP_SZ; y++) {
                    for(let x=0; x<MAP_SZ; x++) {
                        const sx = x*TILE - cam.x, sy = y*TILE - cam.y;
                        if (sx < -TILE || sy < -TILE || sx > this.canvas.width || sy > this.canvas.height) continue;
                        const edge = x < 2 || y < 2 || x > MAP_SZ-3 || y > MAP_SZ-3;
                        ctx.fillStyle = edge ? '#2a4e6e' : ((x+y)%2 ? '#4a6e2a' : '#3e6224');
                        ctx.fillRect(sx, sy, TILE, TILE);
                        ctx.strokeStyle = 'rgba(0,0,0,0.05)'; ctx.strokeRect(sx, sy, TILE, TILE);
                    }
                }

                cur.placed.forEach(p => {
                    const b = this.config[s][p.type];
                    const sx = p.gx*TILE - cam.x, sy = p.gy*TILE - cam.y;
                    ctx.fillStyle = s === 'human' ? '#8a7a5a' : '#4a1a1a';
                    ctx.fillRect(sx+2, sy+2, b.size[0]*TILE-4, b.size[1]*TILE-4);
                    ctx.fillStyle = 'white'; ctx.font = '20px serif'; ctx.textAlign = 'center';
                    ctx.fillText(b.icon, sx + (b.size[0]*TILE)/2, sy + (b.size[1]*TILE)/2 + 7);
                });

                if (cur.selected) {
                    const b = this.config[s][cur.selected];
                    const gx = this.state.mouse.gx, gy = this.state.mouse.gy;
                    ctx.globalAlpha = 0.4; 
                    ctx.fillStyle = (gx < 2 || gy < 2 || gx+b.size[0] > MAP_SZ-2 || gy+b.size[1] > MAP_SZ-2) ? 'red' : 'white';
                    ctx.fillRect(gx*TILE - cam.x, gy*TILE - cam.y, b.size[0]*TILE, b.size[1]*TILE);
                    ctx.globalAlpha = 1;
                }
                requestAnimationFrame(t => this.draw(t));
            },

            log(m) {
                const l = document.getElementById('ui-log');
                const p = document.createElement('p'); p.innerHTML = `> [${new Date().toLocaleTimeString()}] ${m}`;
                l.prepend(p);
            },

            updateUI() {
                const s = this.state.scene; const cur = this.state[s];
                const h = this.state.human, d = this.state.demon, b = this.state.battle;
                
                document.getElementById('ui-res-row').innerHTML = s === 'human' ? `
                    <div class="flex items-center gap-1.5 bg-black/20 px-2 py-1 rounded">🌾 <span id="ui-res-food">${Math.floor(h.food)}</span></div>
                    <div class="flex items-center gap-1.5 bg-black/20 px-2 py-1 rounded">🪵 <span id="ui-res-wood">${Math.floor(h.wood)}</span></div>
                    <div class="flex items-center gap-1.5 bg-black/20 px-2 py-1 rounded">🪨 <span id="ui-res-stone">${Math.floor(h.stone)}</span></div>
                ` : `
                    <div class="flex items-center gap-1.5 bg-black/20 px-2 py-1 rounded">🥩 <span id="ui-res-meat">${Math.floor(d.meat)}</span></div>
                    <div class="flex items-center gap-1.5 bg-black/20 px-2 py-1 rounded">💀 <span id="ui-res-bone">${Math.floor(d.bone)}</span></div>
                    <div class="flex items-center gap-1.5 bg-black/20 px-2 py-1 rounded">🌀 <span id="ui-res-mana">${Math.floor(d.mana)}</span></div>
                `;

                document.getElementById('ui-side-label').innerText = s === 'human' ? 'Alliance Pop' : 'Legion Pop';
                document.getElementById('ui-pop-val').innerText = `${cur.pop} / ${cur.pop + 200}`;
                document.getElementById('ui-pop-bar').style.width = '45%';
                document.getElementById('ui-tiers').innerHTML = s === 'human' ? `<div>PEASANTS: ${h.tiers.peasant}</div><div>CITIZENS: ${h.tiers.citizen}</div>` : `<div>SLAVES: ${d.tiers.slave}</div><div>LORDS: ${d.tiers.lord}</div>`;
                
                document.getElementById('ui-peace').innerText = b.peace;
                const total = b.hForce + b.dForce;
                const balance = (b.hForce / total) * 100;
                document.getElementById('ui-balance').style.width = `${balance}%`;
                document.getElementById('unit-h').style.left = `${balance * 0.7}%`;
                document.getElementById('unit-d').style.right = `${(100 - balance) * 0.7}%`;
                document.getElementById('ui-force-val').innerText = Math.floor(b[s === 'human' ? 'hForce' : 'dForce']);
            },

            loop() {
                setInterval(() => {
                    const h = this.state.human, d = this.state.demon, b = this.state.battle;
                    h.food -= h.pop * 0.05; d.meat -= d.pop * 0.05;
                    h.placed.forEach(p => h[this.config.human[p.type].prod.out] += this.config.human[p.type].prod.val);
                    d.placed.forEach(p => d[this.config.demon[p.type].prod.out] += this.config.demon[p.type].prod.val);
                    b.hForce += (Math.random()*6 - 3); b.dForce += (Math.random()*6 - 3);
                    this.updateUI();
                }, 1000);
            }
        };
        Game.init();
    </script>
</body>
</html>
