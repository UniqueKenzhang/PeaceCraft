<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeaceCraft - 龙王大人的单机和平博弈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Roboto+Mono:wght@400;700&display=swap');
        body { font-family: 'ui-sans-serif', system-ui; }
        .stat-font { font-family: 'Roboto Mono', monospace; }
        .scene-transition { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .active-tab { border-bottom: 4px solid #fbbf24; color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
        input[type=range]::-webkit-slider-runnable-track { background: #374151; height: 8px; border-radius: 4px; }
        input[type=range]::-webkit-slider-thumb { margin-top: -4px; }
    </style>
</head>
<body class="bg-[#0f172a] text-gray-100 min-h-screen">
    <div id="game-app" class="max-w-4xl mx-auto p-4 md:p-8">
        <!-- 顶栏：龙王的视野 -->
        <header class="flex justify-between items-end mb-8 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-4xl font-black text-amber-500 tracking-tighter">PEACECRAFT</h1>
                <p class="text-xs text-slate-500 mt-1 uppercase tracking-widest">虾总管：单机逻辑 1.0 版 呈报</p>
            </div>
            <div class="text-right">
                <div class="text-[10px] text-slate-500 uppercase font-bold">和平溢价 (Peace Score)</div>
                <div id="ui-peace-score" class="text-3xl font-black text-green-400 stat-font">0</div>
            </div>
        </header>

        <!-- 场景导航 -->
        <nav class="grid grid-cols-3 gap-2 mb-8 bg-slate-900/50 p-1 rounded-2xl border border-slate-800">
            <button onclick="Game.switchScene('human')" id="tab-human" class="py-4 rounded-xl font-bold transition-all active-tab">🛡️ 人类领地</button>
            <button onclick="Game.switchScene('battle')" id="tab-battle" class="py-4 rounded-xl font-bold transition-all">⚔️ 终焉战场</button>
            <button onclick="Game.switchScene('demon')" id="tab-demon" class="py-4 rounded-xl font-bold transition-all">🔥 魔族深渊</button>
        </nav>

        <!-- 动态场景容器 -->
        <main id="main-stage">
            <!-- 人类场景 -->
            <div id="scene-human" class="scene-content space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-blue-950/30 border border-blue-500/20 p-6 rounded-3xl shadow-inner">
                        <div class="text-blue-400 text-xs font-bold mb-2 uppercase">领地人口</div>
                        <div id="ui-h-pop" class="text-4xl font-black stat-font">100</div>
                    </div>
                    <div class="bg-blue-950/30 border border-blue-500/20 p-6 rounded-3xl shadow-inner">
                        <div class="text-blue-400 text-xs font-bold mb-2 uppercase">储备粮食</div>
                        <div id="ui-h-food" class="text-4xl font-black stat-font text-blue-200">500</div>
                    </div>
                </div>
                <div class="bg-slate-900 p-8 rounded-[2.5rem] border border-slate-800 shadow-2xl">
                    <h2 class="text-xl font-bold mb-8 text-blue-400 flex items-center">📦 物资调拨：人类前线</h2>
                    <div class="space-y-10">
                        <div class="space-y-4">
                            <div class="flex justify-between font-bold text-sm"><span>真货比例 (战斗)</span><span id="ui-h-true-val" class="text-blue-500">33%</span></div>
                            <input type="range" id="input-h-true" oninput="Game.updateSliders('h')" class="w-full appearance-none bg-transparent cursor-pointer accent-blue-500">
                        </div>
                        <div class="space-y-4 text-green-400">
                            <div class="flex justify-between font-bold text-sm"><span>搞怪武器 (救人)</span><span id="ui-h-funny-val">33%</span></div>
                            <input type="range" id="input-h-funny" oninput="Game.updateSliders('h')" class="w-full appearance-none bg-transparent cursor-pointer accent-green-500">
                        </div>
                        <button onclick="Game.executeSupply('human')" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-black text-xl shadow-lg transition-transform active:scale-95">发起秘密补给</button>
                    </div>
                </div>
            </div>

            <!-- 战场场景 -->
            <div id="scene-battle" class="scene-content hidden space-y-12 py-10">
                <div class="text-center space-y-6">
                    <h3 class="text-slate-500 font-bold uppercase tracking-[0.3em] text-sm">力量平衡天平</h3>
                    <div class="relative h-16 bg-slate-950 rounded-2xl border-4 border-slate-800 overflow-hidden flex items-center">
                        <div id="ui-balance-bar" class="h-full bg-gradient-to-r from-blue-600 via-amber-500 to-red-600 transition-all duration-700 shadow-[0_0_20px_rgba(245,158,11,0.2)]" style="width: 50%;"></div>
                        <div class="absolute inset-0 flex justify-between items-center px-10 font-black italic tracking-tighter text-lg mix-blend-overlay">
                            <span>ALLIANCE</span>
                            <span>LEGION</span>
                        </div>
                    </div>
                    <p class="text-amber-600 text-xs font-bold animate-pulse">! 平衡偏离安全区 (40-60%) 将触发灭世警告 !</p>
                </div>
                <div id="ui-battle-log" class="bg-black/40 rounded-3xl p-6 h-60 overflow-y-auto font-mono text-sm text-slate-500 border border-slate-800/50 leading-relaxed">
                    <p class="text-slate-700">> [SYSTEM] 战场监控已就绪...</p>
                </div>
            </div>

            <!-- 魔族场景 (结构同人类) -->
            <div id="scene-demon" class="scene-content hidden space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-red-950/20 border border-red-500/20 p-6 rounded-3xl">
                        <div class="text-red-500 text-xs font-bold mb-2 uppercase">魔众数量</div>
                        <div id="ui-d-pop" class="text-4xl font-black stat-font">100</div>
                    </div>
                    <div class="bg-red-950/20 border border-red-500/20 p-6 rounded-3xl">
                        <div class="text-red-500 text-xs font-bold mb-2 uppercase">储备肉食</div>
                        <div id="ui-d-meat" class="text-4xl font-black stat-font text-red-200">500</div>
                    </div>
                </div>
                <div class="bg-slate-900 p-8 rounded-[2.5rem] border border-slate-800">
                    <h2 class="text-xl font-bold mb-8 text-red-500 flex items-center">🔥 鲜血调拨：深渊前线</h2>
                    <div class="space-y-10">
                        <div class="space-y-4 text-red-500">
                            <div class="flex justify-between font-bold text-sm"><span>深渊真货 (破坏)</span><span id="ui-d-true-val">33%</span></div>
                            <input type="range" id="input-d-true" oninput="Game.updateSliders('d')" class="w-full appearance-none bg-transparent cursor-pointer accent-red-600">
                        </div>
                        <div class="space-y-4 text-green-400">
                            <div class="flex justify-between font-bold text-sm"><span>滑稽恶作剧 (救人)</span><span id="ui-d-funny-val">33%</span></div>
                            <input type="range" id="input-d-funny" oninput="Game.updateSliders('d')" class="w-full appearance-none bg-transparent cursor-pointer accent-green-500">
                        </div>
                        <button onclick="Game.executeSupply('demon')" class="w-full bg-red-700 hover:bg-red-600 py-5 rounded-2xl font-black text-xl transition-all">发起黑暗补给</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- 虾总管单机版引擎：逻辑大一统 ---
        const Game = {
            state: {
                human: { pop: 100, food: 500 },
                demon: { pop: 100, meat: 500 },
                battle: { hForce: 500, dForce: 500, peaceScore: 0 },
                activeScene: 'human'
            },

            init() {
                this.loop();
                console.log("PeaceCraft 单机内核已启动！");
            },

            switchScene(scene) {
                this.state.activeScene = scene;
                document.querySelectorAll('.scene-content').forEach(el => el.classList.add('hidden'));
                document.querySelectorAll('nav button').forEach(el => el.classList.remove('active-tab'));
                document.getElementById('scene-' + scene).classList.remove('hidden');
                document.getElementById('tab-' + scene).classList.add('active-tab');
            },

            updateSliders(side) {
                const t = document.getElementById(`input-${side}-true`).value;
                const f = document.getElementById(`input-${side}-funny`).value;
                document.getElementById(`ui-${side}-true-val`).innerText = `${t}%`;
                document.getElementById(`ui-${side}-funny-val`).innerText = `${f}%`;
            },

            executeSupply(target) {
                const t = document.getElementById(`input-${target[0]}-true`).value / 100;
                const f = document.getElementById(`input-${target[0]}-funny`).value / 100;
                const fake = Math.max(0, 1 - t - f);

                // 核心逻辑搬迁：单机即时计算
                if (target === 'human') {
                    this.state.battle.hForce += t * 60;
                    this.state.battle.hForce -= fake * 40;
                    const saved = Math.floor(f * 30);
                    this.state.human.pop += saved;
                    this.state.battle.peaceScore += saved * 10;
                    this.log(`人类补给抵达：由于搞怪，成功救回 ${saved} 名逃兵！`);
                } else {
                    this.state.battle.dForce += t * 60;
                    this.state.battle.dForce -= fake * 40;
                    const saved = Math.floor(f * 30);
                    this.state.demon.pop += saved;
                    this.state.battle.peaceScore += saved * 10;
                    this.log(`魔族补给抵达：${saved} 个恶魔被逗笑了，加入了领地建设！`);
                }
                this.updateUI();
            },

            log(msg) {
                const container = document.getElementById('ui-battle-log');
                const p = document.createElement('p');
                p.className = "mt-1 text-amber-400/80";
                p.innerText = `> [${new Date().toLocaleTimeString()}] ${msg}`;
                container.prepend(p);
            },

            updateUI() {
                // 更新人口与资源
                document.getElementById('ui-h-pop').innerText = this.state.human.pop;
                document.getElementById('ui-h-food').innerText = Math.floor(this.state.human.food);
                document.getElementById('ui-d-pop').innerText = this.state.demon.pop;
                document.getElementById('ui-d-meat').innerText = Math.floor(this.state.demon.meat);
                
                // 更新天平与和平分
                const total = this.state.battle.hForce + this.state.battle.dForce;
                const balance = (this.state.battle.hForce / total) * 100;
                document.getElementById('ui-balance-bar').style.width = `${balance}%`;
                document.getElementById('ui-peace-score').innerText = this.state.battle.peaceScore;
            },

            loop() {
                setInterval(() => {
                    // 全效同步产出逻辑
                    this.state.human.food += this.state.human.pop * 0.15;
                    this.state.demon.meat += this.state.demon.pop * 0.15;
                    
                    // 战力随时间缓慢损耗 (模拟战争)
                    this.state.battle.hForce = Math.max(100, this.state.battle.hForce - 1);
                    this.state.battle.dForce = Math.max(100, this.state.battle.dForce - 1);
                    
                    this.updateUI();
                }, 1000);
            }
        };

        Game.init();
    </script>
</body>
</html>
