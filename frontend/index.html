<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeaceCraft - Anno Elite v4.5 (PraisonAI Integrated)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0806; --bg-panel: #1c1814; --bg-card: #2a241e;
            --gold: #c9a84c; --gold-bright: #e8c84a; --border: #3d3529;
            --vignette: radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(0,0,0,0.8) 100%);
        }
        @keyframes subtle-zoom {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        @keyframes glow-pulse {
            0% { box-shadow: 0 0 5px var(--gold); }
            50% { box-shadow: 0 0 20px var(--gold); }
            100% { box-shadow: 0 0 5px var(--gold); }
        }
        body { 
            font-family: 'Crimson Pro', serif; background-color: var(--bg-dark); color: #d4c5a9; 
            overflow: hidden; margin: 0; user-select: none; position: relative;
        }
        .bg-layer {
            position: fixed; inset: 0; z-index: -1;
            background-image: url('../assets/image4.png'); background-size: cover; background-position: center; 
            animation: subtle-zoom 60s ease-in-out infinite;
        }
        .bg-overlay {
            position: fixed; inset: 0; z-index: -1;
            background: var(--vignette); pointer-events: none;
        }
        
        #game-container { display: flex; width: 100vw; height: 100vh; background: rgba(10, 8, 6, 0.75); backdrop-filter: blur(4px); }
        #sidebar { 
            width: 340px; background: rgba(28, 24, 20, 0.98); 
            border-right: 3px solid transparent; border-image: linear-gradient(to bottom, var(--gold), var(--border), var(--gold)) 1;
            display: flex; flex-direction: column; z-index: 50; box-shadow: 15px 0 40px rgba(0,0,0,0.7); overflow-y: auto; 
        }
        
        #main-area { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        #top-bar { height: 64px; background: linear-gradient(180deg, #231f1a 0%, #1a1612 100%); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; z-index: 40; }

        .bld-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .bld-item { 
            aspect-ratio: 1; background: var(--bg-card); border: 1px solid var(--border); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: all 0.2s; cursor: pointer; border-radius: 4px;
        }
        .bld-item:hover { 
            background: #3d3529; border-color: var(--gold); 
            animation: glow-pulse 2s infinite ease-in-out;
            transform: translateY(-2px);
            z-index: 10;
        }
        .bld-item.selected { border-color: var(--gold-bright); box-shadow: 0 0 25px rgba(201,168,76,0.5); transform: scale(1.05); }
        
        /* Custom range sliders */
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 0; }
        input[type=range]::-moz-range-thumb { width: 0; }
        
        canvas { display: block; width: 100%; height: 100%; background: #000; }

        /* Happiness Meters from PraisonAI */
        .happiness-meter { height: 3px; background: rgba(0,0,0,0.5); border-radius: 2px; margin-top: 6px; overflow: hidden; }
        .happiness-fill { height: 100%; background: #6a9e4a; transition: width 0.5s; }
        .status-positive { color: #6a9e4a; font-weight: bold; }
        .status-negative { color: #c45c4a; font-weight: bold; }

        .tab-btn { font-family: 'Cinzel'; font-size: 10px; letter-spacing: 2px; color: #8a7e6a; border-bottom: 2px solid transparent; transition: 0.2s; }
        .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="bg-overlay"></div>
    <div id="game-container">
        <!-- ANNO SIDEBAR (PraisonAI Refined) -->
        <div id="sidebar">
            <div class="p-8 border-b border-white/5 text-center bg-black/20">
                <div id="side-hero-img" class="w-full h-24 mb-4 rounded border border-gold/20 overflow-hidden">
                    <img src="../assets/image1.png" class="w-full h-full object-cover opacity-60">
                </div>
                <h1 class="stat-font text-gold text-2xl tracking-[6px] font-black italic">帝国总署</h1>
                <p class="text-[9px] text-slate-500 uppercase tracking-[3px] mt-1">PeaceCraft Imperial Command</p>
            </div>

            <div class="p-6 space-y-8">
                <!-- Population & Happiness -->
                <section>
                    <div class="flex justify-between items-end mb-2">
                        <span class="stat-font text-[11px] text-slate-400 uppercase">人口阶层与幸福度</span>
                        <span id="ui-pop-count" class="mono text-gold text-sm font-bold">0</span>
                    </div>
                    <div id="ui-pop-tiers" class="space-y-4">
                        <!-- Tiers with Happiness Meters Injected -->
                    </div>
                </section>

                <!-- Construction -->
                <section class="border-t border-white/5 pt-6">
                    <span class="stat-font text-[11px] text-slate-400 uppercase block mb-4">建筑工部</span>
                    <div class="flex gap-2 mb-4 bg-black/20 p-1 rounded-lg">
                        <button onclick="Game.switchTab('raw')" id="tab-raw" class="flex-1 py-2 tab-btn active uppercase">工业生产</button>
                        <button onclick="Game.switchTab('civil')" id="tab-civil" class="flex-1 py-2 tab-btn uppercase">市政民生</button>
                    </div>
                    <div id="bld-grid" class="bld-grid"></div>
                </section>
            </div>

            <div class="mt-auto p-6 bg-black/40 border-t border-white/10">
                <button onclick="Game.switchScene('battle')" class="w-full py-4 bg-gold hover:bg-gold-bright text-black stat-font text-[10px] font-black tracking-[3px] transition-all">前线战报视察</button>
            </div>
        </div>

        <div id="main-area">
            <div id="top-bar" class="justify-between">
                <div class="flex gap-10">
                    <button onclick="Game.switchScene('human')" id="scene-human" class="stat-font text-[11px] tracking-[2px] font-bold text-gold">联盟旧世界</button>
                    <button onclick="Game.switchScene('demon')" id="scene-demon" class="stat-font text-[11px] tracking-[2px] font-bold text-slate-500">深渊新世界</button>
                </div>
                <div id="res-bar" class="flex gap-8 items-center mono text-[12px]"></div>
                <div class="text-right">
                    <span class="text-[9px] text-slate-500 uppercase font-bold block tracking-widest">和平指数</span>
                    <span id="ui-peace" class="text-gold font-black stat-font text-2xl">0</span>
                </div>
            </div>

            <div id="viewport" class="flex-1 relative bg-black">
                <canvas id="gameCanvas"></canvas>
                
                <!-- Supply Overlay (Enhanced Anno Style) -->
                <div id="supply-ui" class="absolute bottom-10 left-1/2 -translate-x-1/2 bg-[#1c1814]/98 border-t-2 border-b-2 border-gold/40 p-10 w-[680px] shadow-[0_20px_60px_rgba(0,0,0,0.9)] backdrop-blur-xl rounded-sm">
                    <!-- Ornate Corner Decorations -->
                    <div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-gold/60"></div>
                    <div class="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-gold/60"></div>
                    <div class="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-gold/60"></div>
                    <div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-gold/60"></div>

                    <div class="flex justify-between items-center mb-8 border-b border-gold/10 pb-6">
                        <div>
                            <span id="ui-force-side" class="stat-font text-[10px] text-gold/60 uppercase tracking-[6px] block mb-1">PeaceCraft Logistic Command</span>
                            <h2 class="stat-font text-xl text-gold tracking-[4px] font-black uppercase italic">战略物资调拨枢纽</h2>
                        </div>
                        <div class="text-right">
                            <span class="text-[9px] text-slate-500 uppercase tracking-widest block">储备总量</span>
                            <span id="ui-force-val" class="mono text-white text-4xl font-black italic tracking-tighter">500</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-16 mb-10">
                        <div class="space-y-6">
                            <div class="flex justify-between items-end">
                                <div class="flex items-center gap-3">
                                    <span class="text-2xl">⚔️</span>
                                    <div>
                                        <span class="text-[10px] uppercase font-bold text-slate-400 block tracking-widest">真钢兵刃</span>
                                        <span class="text-[8px] text-gold/40 italic">True-Steel Armaments</span>
                                    </div>
                                </div>
                                <span id="v-true" class="mono text-white font-bold text-lg">50%</span>
                            </div>
                            <div class="relative h-2 bg-black/60 rounded-full border border-white/5 overflow-hidden">
                                <input type="range" id="in-true" oninput="Game.upSlid()" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20">
                                <div id="bar-true" class="absolute inset-y-0 left-0 bg-gradient-to-r from-gold/40 to-gold shadow-[0_0_10px_var(--gold)] transition-all duration-300" style="width: 50%"></div>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div class="flex justify-between items-end">
                                <div class="flex items-center gap-3">
                                    <span class="text-2xl">🎭</span>
                                    <div>
                                        <span class="text-[10px] uppercase font-bold text-slate-400 block tracking-widest">滑稽搞怪</span>
                                        <span class="text-[8px] text-gold/40 italic">Whimsical Artifacts</span>
                                    </div>
                                </div>
                                <span id="v-funny" class="mono text-gold font-bold text-lg">50%</span>
                            </div>
                            <div class="relative h-2 bg-black/60 rounded-full border border-white/5 overflow-hidden">
                                <input type="range" id="in-funny" oninput="Game.upSlid()" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20">
                                <div id="bar-funny" class="absolute inset-y-0 left-0 bg-gradient-to-r from-gold/40 to-gold shadow-[0_0_10px_var(--gold)] transition-all duration-300" style="width: 50%"></div>
                            </div>
                        </div>
                    </div>

                    <button onclick="Game.dispatch()" class="group relative w-full overflow-hidden py-5 bg-gold hover:bg-gold-bright transition-all duration-300">
                        <div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                        <span class="relative z-10 text-black font-black uppercase text-[12px] tracking-[6px] stat-font">授权商队出发 (Authorize Convoy)</span>
                    </button>
                </div>

                <!-- Battle View -->
                <div id="battle-view" class="hidden absolute inset-0 bg-[#0a0806]/95 flex flex-col items-center justify-center space-y-16">
                    <div class="w-full max-w-3xl text-center space-y-6">
                        <div class="stat-font text-xs tracking-[1em] text-gold/40 uppercase">万界天平核心</div>
                        <div class="h-1 bg-white/5 rounded-full overflow-hidden"><div id="ui-balance" class="h-full bg-gold shadow-[0_0_20px_#c9a84c] transition-all duration-1000" style="width: 50%"></div></div>
                    </div>
                    <div class="flex items-center justify-between w-full px-48">
                        <div id="unit-h" class="text-7xl opacity-50 transition-all duration-1000 grayscale hover:grayscale-0">🛡️</div>
                        <div class="stat-font text-white/5 text-[10rem] font-black italic">平衡</div>
                        <div id="unit-d" class="text-7xl opacity-50 transition-all duration-1000 grayscale hover:grayscale-0">🔥</div>
                    </div>
                    <div id="ui-log" class="w-full max-w-2xl h-40 bg-black/40 p-6 overflow-y-auto mono text-[10px] text-slate-600 scroll-smooth leading-loose"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TILE = 56; const MAP_SZ = 40;
        const Game = {
            state: {
                human: { pop: 100, tiers: { peasant: 100, citizen: 0 }, food: 500, wood: 200, stone: 100, placed: [], camera: { x: 1000, y: 1000 }, selected: null },
                demon: { pop: 100, tiers: { slave: 100, lord: 0 }, meat: 500, bone: 200, mana: 100, placed: [], camera: { x: 1000, y: 1000 }, selected: null },
                battle: { hForce: 500, dForce: 500, peace: 0 },
                scene: 'human', tab: 'raw', mouse: { x: 0, y: 0, gx: 0, gy: 0 }, drag: null
            },
            config: {
                human: { farm: { icon: '🌾', size: [2,2], cat: 'raw', cost: { wood: 50 }, prod: { out: 'food', val: 10 } }, sawmill: { icon: '🪚', size: [1,1], cat: 'raw', cost: { stone: 80 }, prod: { out: 'wood', val: 6 } }, quarry: { icon: '⛏️', size: [2,1], cat: 'raw', cost: { wood: 120 }, prod: { out: 'stone', val: 4 } } },
                demon: { pit: { icon: '🥩', size: [2,2], cat: 'raw', cost: { bone: 50 }, prod: { out: 'meat', val: 10 } }, altar: { icon: '💀', size: [1,1], cat: 'raw', cost: { mana: 80 }, prod: { out: 'bone', val: 6 } }, rift: { icon: '🌀', size: [2,1], cat: 'raw', cost: { bone: 120 }, prod: { out: 'mana', val: 4 } } }
            },
            init() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                window.addEventListener('resize', () => this.resize()); this.resize();
                this.canvas.addEventListener('mousedown', e => this.onDown(e));
                window.addEventListener('mousemove', e => this.onMove(e));
                window.addEventListener('mouseup', () => this.state.drag = null);
                this.canvas.addEventListener('contextmenu', e => { e.preventDefault(); this.demolish(); });
                this.renderBldGrid(); this.loop(); requestAnimationFrame(t => this.draw(t));
                console.log("PraisonAI Team: Logic Stabilized. Anno Engine Hotfixed.");
            },
            resize() { 
                const rect = this.canvas.parentElement.getBoundingClientRect();
                this.canvas.width = rect.width; this.canvas.height = rect.height;
            },
            switchScene(s) {
                this.state.scene = s;
                const heroImg = document.querySelector('#side-hero-img img');
                if (heroImg) {
                    heroImg.src = s === 'human' ? '../assets/image1.png' : 
                                 s === 'demon' ? '../assets/image2.png' : '../assets/image4.png';
                }
                document.querySelectorAll('#top-bar button').forEach(b => b.classList.replace('text-gold', 'text-slate-500'));
                if (s !== 'battle') document.getElementById(`scene-${s}`).classList.replace('text-slate-500', 'text-gold');
                document.getElementById('battle-view').classList.toggle('hidden', s !== 'battle');
                document.getElementById('supply-ui').classList.toggle('hidden', s === 'battle');
                this.renderBldGrid(); this.updateUI();
            },
            switchTab(t) {
                this.state.tab = t; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`tab-${t}`).classList.add('active'); this.renderBldGrid();
            },
            renderBldGrid() {
                const s = this.state.scene; if (s === 'battle') return;
                const el = document.getElementById('bld-grid'); el.innerHTML = '';
                Object.entries(this.config[s]).forEach(([k, b]) => {
                    if (b.cat !== this.state.tab) return;
                    const item = document.createElement('div');
                    item.className = `bld-item ${this.state[s].selected === k ? 'selected' : ''} relative overflow-hidden`;
                    
                    // Production Chain Visual integration
                    const isProd = k === 'sawmill' || k === 'altar' || k === 'farm' || k === 'pit';
                    const bgUrl = isProd ? '../assets/image3.png' : '';
                    
                    item.innerHTML = `
                        ${bgUrl ? `<img src="${bgUrl}" class="absolute inset-0 w-full h-full object-cover opacity-20 grayscale">` : ''}
                        <span class="text-3xl z-10">${b.icon}</span>
                    `;
                    item.onclick = () => { this.state[s].selected = (this.state[s].selected === k) ? null : k; this.renderBldGrid(); };
                    el.appendChild(item);
                });
            },
            onDown(e) {
                if (e.button === 0) {
                    if (this.state[this.state.scene]?.selected) this.place();
                    else this.state.drag = { x: e.clientX, y: e.clientY, camX: this.state[this.state.scene].camera.x, camY: this.state[this.state.scene].camera.y };
                }
            },
            onMove(e) {
                const rect = this.canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left, my = e.clientY - rect.top;
                this.state.mouse.x = mx; this.state.mouse.y = my;
                const cur = this.state[this.state.scene];
                if (this.state.drag && cur) {
                    cur.camera.x = this.state.drag.camX - (e.clientX - this.state.drag.x);
                    cur.camera.y = this.state.drag.camY - (e.clientY - this.state.drag.y);
                    const max = MAP_SZ * TILE;
                    cur.camera.x = Math.max(0, Math.min(max - this.canvas.width, cur.camera.x));
                    cur.camera.y = Math.max(0, Math.min(max - this.canvas.height, cur.camera.y));
                }
                if (cur) {
                    this.state.mouse.gx = Math.floor((mx + cur.camera.x) / TILE);
                    this.state.mouse.gy = Math.floor((my + cur.camera.y) / TILE);
                }
            },
            place() {
                const s = this.state.scene; const cur = this.state[s];
                const type = cur.selected; const b = this.config[s][type];
                const gx = this.state.mouse.gx, gy = this.state.mouse.gy;
                if (gx < 2 || gy < 2 || gx + b.size[0] > MAP_SZ - 2 || gy + b.size[1] > MAP_SZ - 2) return;
                for(let p of cur.placed) {
                    const pb = this.config[s][p.type];
                    if (!(gx + b.size[0] <= p.gx || gx >= p.gx + pb.size[0] || gy + b.size[1] <= p.gy || gy >= p.gy + pb.size[1])) return;
                }
                for(let r in b.cost) if (cur[r] < b.cost[r]) return;
                for(let r in b.cost) cur[r] -= b.cost[r];
                cur.placed.push({ type, gx, gy }); this.updateUI();
            },
            demolish() {
                const s = this.state.scene; const cur = this.state[s];
                const gx = this.state.mouse.gx, gy = this.state.mouse.gy;
                const idx = cur.placed.findIndex(p => {
                    const pb = this.config[s][p.type];
                    return gx >= p.gx && gx < p.gx + pb.size[0] && gy >= p.gy && gy < p.gy + pb.size[1];
                });
                if (idx !== -1) { 
                    const p = cur.placed[idx]; for(let r in this.config[s][p.type].cost) cur[r] += Math.floor(this.config[s][p.type].cost[r] * 0.5);
                    cur.placed.splice(idx, 1); this.updateUI(); 
                }
            },
            upSlid() {
                const vT = document.getElementById('in-true').value;
                const vF = document.getElementById('in-funny').value;
                document.getElementById('v-true').innerText = vT + '%';
                document.getElementById('v-funny').innerText = vF + '%';
                document.getElementById('bar-true').style.width = vT + '%';
                document.getElementById('bar-funny').style.width = vF + '%';
            },
            dispatch() {
                const s = this.state.scene; this.log(`Convoy dispatched to the front.`);
                setTimeout(() => {
                    const key = s === 'human' ? 'hForce' : 'dForce';
                    this.state.battle[key] += 200;
                    this.updateUI();
                }, 2000);
            },
            draw() {
                const s = this.state.scene; if (s === 'battle') { requestAnimationFrame(t => this.draw(t)); return; }
                const ctx = this.ctx; const cur = this.state[s]; const cam = cur.camera;
                ctx.clearRect(0,0,this.canvas.width, this.canvas.height);
                // Grid
                for(let y=0; y<MAP_SZ; y++) {
                    for(let x=0; x<MAP_SZ; x++) {
                        const sx = x*TILE - cam.x, sy = y*TILE - cam.y;
                        if (sx < -TILE || sy < -TILE || sx > this.canvas.width || sy > this.canvas.height) continue;
                        const water = x < 2 || y < 2 || x > MAP_SZ-3 || y > MAP_SZ-3;
                        
                        // Enhanced visibility for terrain
                        if (water) {
                            ctx.fillStyle = '#0a1a2a'; // Deep Navy Water
                        } else {
                            const isAlt = (x+y)%2;
                            ctx.fillStyle = s === 'human' ? 
                                (isAlt ? '#3a4a2e' : '#2e3d24') : // Lighter Lush Green for Human
                                (isAlt ? '#4a2620' : '#3a1e1a');  // Deep Crimson/Earth for Demon
                        }
                        
                        ctx.fillRect(sx, sy, TILE, TILE);
                        
                        // Grid lines for clarity
                        ctx.strokeStyle = 'rgba(201,168,76,0.15)'; 
                        ctx.strokeRect(sx, sy, TILE, TILE);
                    }
                }
                // Build
                cur.placed.forEach(p => {
                    const b = this.config[s][p.type];
                    const sx = p.gx*TILE - cam.x, sy = p.gy*TILE - cam.y;
                    ctx.fillStyle = '#2a241e'; ctx.fillRect(sx+2, sy+2, b.size[0]*TILE-4, b.size[1]*TILE-4);
                    ctx.strokeStyle = '#c9a84c44'; ctx.strokeRect(sx+4, sy+4, b.size[0]*TILE-8, b.size[1]*TILE-8);
                    ctx.fillStyle = 'white'; ctx.font = '28px serif'; ctx.textAlign = 'center';
                    ctx.fillText(b.icon, sx + (b.size[0]*TILE)/2, sy + (b.size[1]*TILE)/2 + 10);
                });
                // Preview
                if (cur.selected) {
                    const b = this.config[s][cur.selected];
                    const gx = this.state.mouse.gx, gy = this.state.mouse.gy;
                    ctx.globalAlpha = 0.2; ctx.fillStyle = '#c9a84c';
                    ctx.fillRect(gx*TILE - cam.x, gy*TILE - cam.y, b.size[0]*TILE, b.size[1]*TILE);
                    ctx.globalAlpha = 1;
                }
                requestAnimationFrame(t => this.draw(t));
            },
            log(m) {
                const l = document.getElementById('ui-log'); const p = document.createElement('p');
                p.innerHTML = `<span class="text-white/10 mr-4">RECORDS</span> ${m}`; l.prepend(p);
            },
            updateUI() {
                const s = this.state.scene; const cur = this.state[s];
                const h = this.state.human, d = this.state.demon, b = this.state.battle;
                const resEl = document.getElementById('res-bar');
                resEl.innerHTML = s === 'human' ? `<span>🌾 ${Math.floor(h.food)}</span><span>🪵 ${Math.floor(h.wood)}</span><span>🪨 ${Math.floor(h.stone)}</span>` : 
                                                 `<span>🥩 ${Math.floor(d.meat)}</span><span>💀 ${Math.floor(d.bone)}</span><span>🌀 ${Math.floor(d.mana)}</span>`;
                document.getElementById('ui-pop-count').innerText = Math.floor(h.pop + d.pop);
                document.getElementById('ui-pop-bar').style.width = Math.min(100, (h.pop+d.pop)/20) + '%';
                
                // Happiness Meters (PraisonAI Integrated)
                document.getElementById('ui-pop-tiers').innerHTML = s === 'human' ? 
                    `<div><div class="flex justify-between"><span>PEASANTS</span><span>${Math.floor(h.tiers.peasant)}</span></div><div class="happiness-meter"><div class="happiness-fill" style="width: 85%"></div></div></div>
                     <div><div class="flex justify-between"><span>CITIZENS</span><span>${Math.floor(h.tiers.citizen)}</span></div><div class="happiness-meter"><div class="happiness-fill" style="width: 60%"></div></div></div>` :
                    `<div><div class="flex justify-between"><span>SLAVES</span><span>${Math.floor(d.tiers.slave)}</span></div><div class="happiness-meter"><div class="happiness-fill" style="width: 40%"></div></div></div>
                     <div><div class="flex justify-between"><span>LORDS</span><span>${Math.floor(d.tiers.lord)}</span></div><div class="happiness-meter"><div class="happiness-fill" style="width: 90%"></div></div></div>`;
                
                document.getElementById('ui-peace').innerText = b.peace;
                document.getElementById('ui-balance').style.width = (b.hForce / (b.hForce + b.dForce)) * 100 + '%';
                document.getElementById('ui-force-val').innerText = Math.floor(b[s === 'human' ? 'hForce' : 'dForce']);
            },
            loop() {
                setInterval(() => {
                    const h = this.state.human, d = this.state.demon, b = this.state.battle;
                    h.food -= h.pop * 0.04; d.meat -= d.pop * 0.04;
                    h.placed.forEach(p => h[this.config.human[p.type].prod.out] += this.config.human[p.type].prod.val);
                    d.placed.forEach(p => d[this.config.demon[p.type].prod.out] += this.config.demon[p.type].prod.val);
                    b.hForce += (Math.random()*4 - 2); b.dForce += (Math.random()*4 - 2);
                    this.updateUI();
                }, 1000);
            }
        };
        Game.init();
    </script>
</body>
</html>
