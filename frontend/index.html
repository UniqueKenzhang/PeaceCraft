<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeaceCraft - 龙王大人的单机和平博弈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Roboto+Mono:wght@400;700&display=swap');
        body { font-family: 'ui-sans-serif', system-ui; }
        .stat-font { font-family: 'Roboto Mono', monospace; }
        .scene-transition { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .active-tab { border-bottom: 4px solid #fbbf24; color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
        input[type=range]::-webkit-slider-runnable-track { background: #374151; height: 8px; border-radius: 4px; }
        input[type=range]::-webkit-slider-thumb { margin-top: -4px; }
    </style>
</head>
<body class="bg-[#0f172a] text-gray-100 min-h-screen">
    <div id="game-app" class="max-w-4xl mx-auto p-4 md:p-8">
        <!-- 顶栏：龙王的视野 -->
        <header class="flex justify-between items-end mb-8 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-4xl font-black text-amber-500 tracking-tighter">PEACECRAFT</h1>
                <p class="text-xs text-slate-500 mt-1 uppercase tracking-widest">虾总管：单机逻辑 1.0 版 呈报</p>
            </div>
            <div class="text-right">
                <div class="text-[10px] text-slate-500 uppercase font-bold">和平溢价 (Peace Score)</div>
                <div id="ui-peace-score" class="text-3xl font-black text-green-400 stat-font">0</div>
            </div>
        </header>

        <!-- 场景导航 -->
        <nav class="grid grid-cols-3 gap-2 mb-8 bg-slate-900/50 p-1 rounded-2xl border border-slate-800">
            <button onclick="Game.switchScene('human')" id="tab-human" class="py-4 rounded-xl font-bold transition-all active-tab">🛡️ 人类领地</button>
            <button onclick="Game.switchScene('battle')" id="tab-battle" class="py-4 rounded-xl font-bold transition-all">⚔️ 终焉战场</button>
            <button onclick="Game.switchScene('demon')" id="tab-demon" class="py-4 rounded-xl font-bold transition-all">🔥 魔族深渊</button>
        </nav>

        <!-- 动态场景容器 -->
        <main id="main-stage">
            <!-- 人类场景 -->
            <div id="scene-human" class="scene-content space-y-6">
                <div class="grid grid-cols-4 gap-4">
                    <div class="bg-blue-950/30 border border-blue-500/20 p-4 rounded-2xl shadow-inner">
                        <div class="text-blue-400 text-[10px] font-bold mb-1 uppercase">人口</div>
                        <div id="ui-h-pop" class="text-2xl font-black stat-font">100</div>
                    </div>
                    <div class="bg-blue-950/30 border border-blue-500/20 p-4 rounded-2xl shadow-inner">
                        <div class="text-blue-400 text-[10px] font-bold mb-1 uppercase">粮食</div>
                        <div id="ui-h-food" class="text-2xl font-black stat-font text-blue-200">500</div>
                    </div>
                    <div class="bg-blue-950/30 border border-blue-500/20 p-4 rounded-2xl shadow-inner">
                        <div class="text-blue-400 text-[10px] font-bold mb-1 uppercase">木材</div>
                        <div id="ui-h-wood" class="text-2xl font-black stat-font text-amber-600">200</div>
                    </div>
                    <div class="bg-blue-950/30 border border-blue-500/20 p-4 rounded-2xl shadow-inner">
                        <div class="text-blue-400 text-[10px] font-bold mb-1 uppercase">石材</div>
                        <div id="ui-h-stone" class="text-2xl font-black stat-font text-slate-400">100</div>
                    </div>
                </div>
                <div class="bg-slate-900 p-8 rounded-[2.5rem] border border-slate-800 shadow-2xl">
                    <h2 class="text-xl font-bold mb-8 text-blue-400 flex items-center">📦 物资调拨：人类前线</h2>
                    <div class="space-y-10">
                        <div class="space-y-4">
                            <div class="flex justify-between font-bold text-sm"><span>真货比例 (战斗)</span><span id="ui-h-true-val" class="text-blue-500">33%</span></div>
                            <input type="range" id="input-h-true" oninput="Game.updateSliders('h')" class="w-full appearance-none bg-transparent cursor-pointer accent-blue-500">
                        </div>
                        <div class="space-y-4 text-green-400">
                            <div class="flex justify-between font-bold text-sm"><span>搞怪武器 (救人)</span><span id="ui-h-funny-val">33%</span></div>
                            <input type="range" id="input-h-funny" oninput="Game.updateSliders('h')" class="w-full appearance-none bg-transparent cursor-pointer accent-green-500">
                        </div>
                        <button onclick="Game.executeSupply('human')" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-black text-xl shadow-lg transition-transform active:scale-95">发起秘密补给</button>
                    </div>
                </div>
            </div>

            <!-- 战场场景 -->
            <div id="scene-battle" class="scene-content hidden space-y-12 py-10">
                <div class="text-center space-y-6">
                    <h3 class="text-slate-500 font-bold uppercase tracking-[0.3em] text-sm">力量平衡天平</h3>
                    <div class="relative h-16 bg-slate-950 rounded-2xl border-4 border-slate-800 overflow-hidden flex items-center">
                        <div id="ui-balance-bar" class="h-full bg-gradient-to-r from-blue-600 via-amber-500 to-red-600 transition-all duration-700 shadow-[0_0_20px_rgba(245,158,11,0.2)]" style="width: 50%;"></div>
                        <div class="absolute inset-0 flex justify-between items-center px-10 font-black italic tracking-tighter text-lg mix-blend-overlay">
                            <span>ALLIANCE</span>
                            <span>LEGION</span>
                        </div>
                    </div>
                    <p class="text-amber-600 text-xs font-bold animate-pulse">! 平衡偏离安全区 (40-60%) 将触发灭世警告 !</p>
                </div>
                <div id="ui-battle-log" class="bg-black/40 rounded-3xl p-6 h-60 overflow-y-auto font-mono text-sm text-slate-500 border border-slate-800/50 leading-relaxed">
                    <p class="text-slate-700">> [SYSTEM] 战场监控已就绪...</p>
                </div>
            </div>

            <!-- 魔族场景 (结构同人类) -->
            <div id="scene-demon" class="scene-content hidden space-y-6">
                <div class="grid grid-cols-4 gap-4">
                    <div class="bg-red-950/20 border border-red-500/20 p-4 rounded-2xl">
                        <div class="text-red-500 text-[10px] font-bold mb-1 uppercase">魔众</div>
                        <div id="ui-d-pop" class="text-2xl font-black stat-font">100</div>
                    </div>
                    <div class="bg-red-950/20 border border-red-500/20 p-4 rounded-2xl">
                        <div class="text-red-500 text-[10px] font-bold mb-1 uppercase">肉食</div>
                        <div id="ui-d-meat" class="text-2xl font-black stat-font text-red-200">500</div>
                    </div>
                    <div class="bg-red-950/20 border border-red-500/20 p-4 rounded-2xl">
                        <div class="text-red-500 text-[10px] font-bold mb-1 uppercase">白骨</div>
                        <div id="ui-d-bone" class="text-2xl font-black stat-font text-slate-300">200</div>
                    </div>
                    <div class="bg-red-950/20 border border-red-500/20 p-4 rounded-2xl">
                        <div class="text-red-500 text-[10px] font-bold mb-1 uppercase">魔能</div>
                        <div id="ui-d-mana" class="text-2xl font-black stat-font text-purple-500">100</div>
                    </div>
                </div>
                <div class="bg-slate-900 p-8 rounded-[2.5rem] border border-slate-800">
                    <h2 class="text-xl font-bold mb-4 text-red-500 flex items-center">🏗️ 深渊建设：魔族生产链</h2>
                    <div class="grid grid-cols-3 gap-4 mb-8">
                        <button onclick="Game.build('demon', 'pit')" class="bg-red-900/20 hover:bg-red-900/40 p-4 rounded-2xl border border-red-500/20 transition-all text-left group">
                            <div class="text-xl mb-1 text-white group-hover:scale-110 transition-transform">🥩 腐肉池</div>
                            <div class="text-[10px] text-red-300">成本: 50 白骨</div>
                            <div class="text-xs font-bold mt-2">已建: <span id="ui-d-pit-count">0</span></div>
                        </button>
                        <button onclick="Game.build('demon', 'altar')" class="bg-red-900/20 hover:bg-red-900/40 p-4 rounded-2xl border border-red-500/20 transition-all text-left group">
                            <div class="text-xl mb-1 text-white group-hover:scale-110 transition-transform">💀 骸骨祭坛</div>
                            <div class="text-[10px] text-red-300">成本: 100 魔能</div>
                            <div class="text-xs font-bold mt-2">已建: <span id="ui-d-altar-count">0</span></div>
                        </button>
                        <button onclick="Game.build('demon', 'rift')" class="bg-red-900/20 hover:bg-red-900/40 p-4 rounded-2xl border border-red-500/20 transition-all text-left group">
                            <div class="text-xl mb-1 text-white group-hover:scale-110 transition-transform">🌀 魔能裂隙</div>
                            <div class="text-[10px] text-red-300">成本: 150 白骨</div>
                            <div class="text-xs font-bold mt-2">已建: <span id="ui-d-rift-count">0</span></div>
                        </button>
                    </div>

                    <h2 class="text-xl font-bold mb-8 text-red-500 flex items-center">🔥 鲜血调拨：深渊前线</h2>
                    <div class="space-y-10">
                        <div class="space-y-4 text-red-500">
                            <div class="flex justify-between font-bold text-sm"><span>深渊真货 (破坏)</span><span id="ui-d-true-val">33%</span></div>
                            <input type="range" id="input-d-true" oninput="Game.updateSliders('d')" class="w-full appearance-none bg-transparent cursor-pointer accent-red-600">
                        </div>
                        <div class="space-y-4 text-green-400">
                            <div class="flex justify-between font-bold text-sm"><span>滑稽恶作剧 (救人)</span><span id="ui-d-funny-val">33%</span></div>
                            <input type="range" id="input-d-funny" oninput="Game.updateSliders('d')" class="w-full appearance-none bg-transparent cursor-pointer accent-green-500">
                        </div>
                        <button onclick="Game.executeSupply('demon')" class="w-full bg-red-700 hover:bg-red-600 py-5 rounded-2xl font-black text-xl transition-all">发起黑暗补给</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- 虾总管单机版引擎：逻辑大一统 ---
        const Game = {
            state: {
                human: { 
                    pop: 100, food: 500, wood: 200, stone: 100,
                    buildings: { farm: 0, sawmill: 0, quarry: 0 }
                },
                demon: { 
                    pop: 100, meat: 500, bone: 200, mana: 100,
                    buildings: { pit: 0, altar: 0, rift: 0 }
                },
                battle: { hForce: 500, dForce: 500, peaceScore: 0 },
                activeScene: 'human'
            },

            init() {
                this.loop();
                console.log("PeaceCraft 单机内核已启动！");
            },

            switchScene(scene) {
                this.state.activeScene = scene;
                document.querySelectorAll('.scene-content').forEach(el => el.classList.add('hidden'));
                document.querySelectorAll('nav button').forEach(el => el.classList.remove('active-tab'));
                document.getElementById('scene-' + scene).classList.remove('hidden');
                document.getElementById('tab-' + scene).classList.add('active-tab');
            },

            updateSliders(side) {
                const t = document.getElementById(`input-${side}-true`).value;
                const f = document.getElementById(`input-${side}-funny`).value;
                document.getElementById(`ui-${side}-true-val`).innerText = `${t}%`;
                document.getElementById(`ui-${side}-funny-val`).innerText = `${f}%`;
            },

            build(side, type) {
                const costs = {
                    human: {
                        farm: { wood: 50 },
                        sawmill: { stone: 100 },
                        quarry: { wood: 150 }
                    },
                    demon: {
                        pit: { bone: 50 },
                        altar: { mana: 100 },
                        rift: { bone: 150 }
                    }
                };
                const cost = costs[side][type];
                let canBuild = true;
                for (let res in cost) {
                    if (this.state[side][res] < cost[res]) canBuild = false;
                }

                if (canBuild) {
                    for (let res in cost) this.state[side][res] -= cost[res];
                    this.state[side].buildings[type]++;
                    this.log(`${side === 'human' ? '人类' : '魔族'}成功建造了 ${type}！`);
                    this.updateUI();
                } else {
                    alert("资源不足，无法动工！");
                }
            },

            executeSupply(target) {
                const t = document.getElementById(`input-${target[0]}-true`).value / 100;
                const f = document.getElementById(`input-${target[0]}-funny`).value / 100;
                const fake = Math.max(0, 1 - t - f);

                this.log(`补给商队已出发，预计 3 秒后抵达 ${target === 'human' ? '前线' : '深渊'}...`);

                // 任务 3.3：延迟抵达逻辑
                setTimeout(() => {
                    // 任务 3.2：武器数值模型 (真货稳健，假货崩盘，搞怪截流)
                    const sideKey = target === 'human' ? 'hForce' : 'dForce';
                    
                    // 1. 真货：稳健提升战力
                    const trueBoost = t * 80;
                    this.state.battle[sideKey] += trueBoost;

                    // 2. 假货：虚假繁荣 (先加后大减)
                    const fakeBoost = fake * 120;
                    this.state.battle[sideKey] += fakeBoost;
                    this.log(`${target === 'human' ? '人类' : '魔族'}由于领到大量物资，战力虚假暴涨！`);
                    
                    // 5秒后假货原形毕露
                    setTimeout(() => {
                        this.state.battle[sideKey] -= (fakeBoost + fake * 100);
                        this.log(`⚠️ 警报！${target === 'human' ? '人类' : '魔族'}的补给中发现大量假货，战力发生崩盘！`);
                        this.updateUI();
                    }, 5000);

                    // 3. 搞怪：截流人口 (救回逃兵)
                    const saved = Math.floor(f * 35);
                    if (target === 'human') {
                        this.state.human.pop += saved;
                    } else {
                        this.state.demon.pop += saved;
                    }
                    this.state.battle.peaceScore += saved * 10;
                    
                    if (saved > 0) {
                        this.log(`✨ 奇迹！通过大人的滑稽补给，成功从战场救回 ${saved} 名人口。`);
                    }
                    
                    this.updateUI();
                }, 3000);
            },

            log(msg) {
                const container = document.getElementById('ui-battle-log');
                const p = document.createElement('p');
                p.className = "mt-1 text-amber-400/80";
                p.innerText = `> [${new Date().toLocaleTimeString()}] ${msg}`;
                container.prepend(p);
            },

            updateUI() {
                // 更新人口与资源
                document.getElementById('ui-h-pop').innerText = this.state.human.pop;
                document.getElementById('ui-h-food').innerText = Math.floor(this.state.human.food);
                document.getElementById('ui-h-wood').innerText = Math.floor(this.state.human.wood);
                document.getElementById('ui-h-stone').innerText = Math.floor(this.state.human.stone);

                document.getElementById('ui-h-farm-count').innerText = this.state.human.buildings.farm;
                document.getElementById('ui-h-sawmill-count').innerText = this.state.human.buildings.sawmill;
                document.getElementById('ui-h-quarry-count').innerText = this.state.human.buildings.quarry;

                document.getElementById('ui-d-pop').innerText = this.state.demon.pop;
                document.getElementById('ui-d-meat').innerText = Math.floor(this.state.demon.meat);
                document.getElementById('ui-d-bone').innerText = Math.floor(this.state.demon.bone);
                document.getElementById('ui-d-mana').innerText = Math.floor(this.state.demon.mana);

                document.getElementById('ui-d-pit-count').innerText = this.state.demon.buildings.pit;
                document.getElementById('ui-d-altar-count').innerText = this.state.demon.buildings.altar;
                document.getElementById('ui-d-rift-count').innerText = this.state.demon.buildings.rift;
                
                // 更新天平与和平分
                const total = this.state.battle.hForce + this.state.battle.dForce;
                const balance = (this.state.battle.hForce / total) * 100;
                document.getElementById('ui-balance-bar').style.width = `${balance}%`;
                document.getElementById('ui-peace-score').innerText = this.state.battle.peaceScore;
            },

            loop() {
                setInterval(() => {
                    // 任务 2.3：人口驱动逻辑 (人口基数决定基础生产效率)
                    const hMultiplier = 1 + (this.state.human.pop / 500); // 每500人产出翻倍
                    const dMultiplier = 1 + (this.state.demon.pop / 500);

                    // 全效同步产出逻辑 (基础 + 建筑加成) * 人口乘数
                    this.state.human.food += ((this.state.human.pop * 0.15) + (this.state.human.buildings.farm * 2)) * hMultiplier;
                    this.state.human.wood += ((this.state.human.pop * 0.05) + (this.state.human.buildings.sawmill * 5)) * hMultiplier;
                    this.state.human.stone += ((this.state.human.pop * 0.02) + (this.state.human.buildings.quarry * 3)) * hMultiplier;

                    this.state.demon.meat += ((this.state.demon.pop * 0.15) + (this.state.demon.buildings.pit * 2)) * dMultiplier;
                    this.state.demon.bone += ((this.state.demon.pop * 0.05) + (this.state.demon.buildings.rift * 5)) * dMultiplier;
                    this.state.demon.mana += ((this.state.demon.pop * 0.02) + (this.state.demon.buildings.altar * 3)) * dMultiplier;
                    
                    // 战力随时间缓慢损耗 (模拟战争)
                    this.state.battle.hForce = Math.max(100, this.state.battle.hForce - 1);
                    this.state.battle.dForce = Math.max(100, this.state.battle.dForce - 1);
                    
                    this.updateUI();
                }, 1000);
            }
        };

        Game.init();
    </script>
</body>
</html>
